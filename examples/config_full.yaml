project_name: autoplasm_full
mode: auto
threads: 4
outdir: results/autoplasm_full
log_dir: log
dry_run: true
mock_tools: true
input:
  sample_sheet: examples/sample_sheet.tsv
plasmid_detection:
  tools:
    - genomad
    - platon
    - plasme
    - plasx
  strategy: weighted_vote
  tool_weights:
    genomad: 0.6
    platon: 0.15
    plasme: 0.15
    plasx: 0.1
host_prediction:
  enable: true
  tools:
    - metaphlan
  use_abundance_correlation: true
  use_crispr_spacer: false
  use_methylation: false
typing:
  enable: true
  tools:
    - plasmidfinder
    - mob_typer
  optional_tools: []
annotation:
  enable: true
  tools:
    - bakta
    - amrfinderplus
    - isescan
    - integronfinder
  optional_tools: []
comparative_genomics:
  enable: true
  tools:
    - mmseqs2
  optional_tools: []
sample_analysis:
  enable: auto
  differential_abundance: auto
network:
  enable: auto
