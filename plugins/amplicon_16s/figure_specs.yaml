# Figure specifications for the amplicon_16s plugin.
# Column names match the actual standard table schemas produced by parsers.

figures:
  - id: read_retention
    type: bar
    source_table: denoising_stats
    x: stage
    y: output_reads
    title: "Read Retention Across Pipeline Stages"
    xlabel: "Stage"
    ylabel: "Reads Retained"
    required: true

  - id: taxonomy_barplot_phylum
    type: bar
    source_table: asv_table
    x: sample_id
    y: abundance
    title: "Total ASV Abundance by Sample"
    xlabel: "Sample"
    ylabel: "Abundance"
    required: true

  - id: alpha_diversity_boxplot
    type: boxplot
    source_table: alpha_diversity
    x: sample_id
    y: shannon_entropy
    title: "Alpha Diversity (Shannon)"
    xlabel: "Sample"
    ylabel: "Shannon Entropy"
    required: true

  - id: beta_diversity_scatter
    type: scatter
    source_table: beta_diversity
    x: sample_a
    y: distance
    title: "Beta Diversity (Sample Pairs)"
    xlabel: "Sample A"
    ylabel: "Distance"
    required: false

  - id: top_taxa_heatmap
    type: heatmap
    source_table: asv_table
    x: sample_id
    title: "Top ASV Abundance Heatmap"
    colormap: "viridis"
    top_n: 50
    required: false

  - id: asv_abundance_scatter
    type: scatter
    source_table: asv_table
    x: asv_id
    y: abundance
    title: "ASV Abundance Distribution"
    xlabel: "ASV"
    ylabel: "Abundance"
    required: false
