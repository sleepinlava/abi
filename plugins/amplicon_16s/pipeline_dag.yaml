# ============================================================================
# Amplicon 16S Pipeline DAG — Canonical Specification
# ============================================================================
# Updated 2026-06-18 with scope, category_dirs, and path templates for the
# universal DAG planner (abi.dag_planner).

abi_version: "0.1"
pipeline_id: amplicon_16s
pipeline_name: "Standard 16S rRNA Amplicon Community Analysis Pipeline"

platforms:
  - illumina

category_dirs:
  qc: 01_trimmed
  preprocessing: 02_merge
  dereplication: 03_derep
  denoising: 04_denoise
  clustering: 04b_otu
  taxonomy: 05_taxonomy
  phylogeny: 05b_phylogeny
  diversity: 06_diversity

standard_tables:
  asv_table:
    description: "ASV abundance per sample"
  taxonomy:
    description: "SINTAX taxonomic assignments (kingdom→species)"
  alpha_diversity:
    description: "Per-sample diversity metrics"
  beta_diversity:
    description: "Between-sample distance matrices"

nodes:
  # ── Primer Trimming ─────────────────────────────────────────────────
  trim_cutadapt:
    tool_id: cutadapt
    platforms: [illumina]
    category: qc
    scope: per_sample
    optional: false
    depends_on: []
    params:
      forward_primer: "CCTACGGGNGGCWGCAG"
      reverse_primer: "GACTACHVGGGTATCTAATCC"
    inputs:
      read1:           {type: file, format: fastq.gz, source: sample_sheet}
      read2:           {type: file, format: fastq.gz, source: sample_sheet}
      forward_primer:  {type: string}
      reverse_primer:  {type: string}
    outputs:
      trimmed_read1:
        type: file
        format: fastq.gz
        path: "{outdir}/{category_dir}/{sample_id}/{sample_id}_trimmed_R1.fastq.gz"
      trimmed_read2:
        type: file
        format: fastq.gz
        path: "{outdir}/{category_dir}/{sample_id}/{sample_id}_trimmed_R2.fastq.gz"
      output_dir:
        type: directory
        path: "{outdir}/{category_dir}/{sample_id}"
    assertions:
      - "output_dir.exists()"

  # ── Merge Paired Reads ──────────────────────────────────────────────
  merge_vsearch:
    tool_id: vsearch_mergepairs
    platforms: [illumina]
    category: preprocessing
    scope: per_sample
    optional: false
    depends_on: [trim_cutadapt]
    inputs:
      read1:  {type: file, format: fastq.gz, source: trim_cutadapt.trimmed_read1}
      read2:  {type: file, format: fastq.gz, source: trim_cutadapt.trimmed_read2}
    outputs:
      merged_fasta:
        type: file
        format: fasta
        contract: {min_size: "100B"}
        path: "{outdir}/{category_dir}/{sample_id}/{sample_id}_merged.fasta"
      output_dir:
        type: directory
        path: "{outdir}/{category_dir}/{sample_id}"
    assertions:
      - "output_dir.exists()"

  # ── Dereplicate ─────────────────────────────────────────────────────
  derep_vsearch:
    tool_id: vsearch_derep
    platforms: [illumina]
    category: dereplication
    scope: per_sample
    optional: false
    depends_on: [merge_vsearch]
    inputs:
      merged_fasta:  {type: file, format: fasta, source: merge_vsearch.merged_fasta}
    outputs:
      derep_fasta:
        type: file
        format: fasta
        contract: {min_size: "100B"}
        path: "{outdir}/{category_dir}/{sample_id}/{sample_id}_derep.fasta"
      output_dir:
        type: directory
        path: "{outdir}/{category_dir}/{sample_id}"
    assertions:
      - "output_dir.exists()"

  # ── Denoise UNOISE3 ─────────────────────────────────────────────────
  denoise_unoise3:
    tool_id: vsearch_denoise
    platforms: [illumina]
    category: denoising
    scope: per_sample
    optional: false
    depends_on: [derep_vsearch]
    inputs:
      derep_fasta:  {type: file, format: fasta, source: derep_vsearch.derep_fasta}
    outputs:
      asv_fasta:
        type: file
        format: fasta
        contract: {min_size: "100B"}
        path: "{outdir}/{category_dir}/{sample_id}/asvs.fasta"
      output_dir:
        type: directory
        path: "{outdir}/{category_dir}/{sample_id}"
    assertions:
      - "output_dir.exists()"

  # ── Optional OTU clustering ─────────────────────────────────────────
  otu_cluster:
    tool_id: vsearch_otu
    platforms: [illumina]
    category: clustering
    scope: per_sample
    optional: true
    depends_on: [denoise_unoise3]
    fallback_depends: [denoise_unoise3]
    inputs:
      asv_fasta:  {type: file, format: fasta, source: denoise_unoise3.asv_fasta}
    outputs:
      otu_table:
        type: file
        format: tsv
        path: "{outdir}/{category_dir}/{sample_id}/{sample_id}_otu.tsv"
      output_dir:
        type: directory
        path: "{outdir}/{category_dir}/{sample_id}"
    assertions:
      - "output_dir.exists()"

  # ── SINTAX Taxonomy ─────────────────────────────────────────────────
  taxonomy_sintax:
    tool_id: vsearch_taxonomy
    platforms: [illumina]
    category: taxonomy
    scope: per_sample
    optional: false
    depends_on: [denoise_unoise3]
    inputs:
      asv_fasta:     {type: file, format: fasta, source: denoise_unoise3.asv_fasta}
      taxonomy_db:   {type: file, format: fasta}
    outputs:
      taxonomy_tsv:
        type: file
        format: tsv
        contract: {min_size: "100B"}
        path: "{outdir}/{category_dir}/{sample_id}/{sample_id}_taxonomy.tsv"
      output_dir:
        type: directory
        path: "{outdir}/{category_dir}/{sample_id}"
    assertions:
      - "output_dir.exists()"

  # ── Combine ASV FASTA ───────────────────────────────────────────────
  phylogeny_combine:
    tool_id: phylogeny_combine
    platforms: [illumina]
    category: phylogeny
    scope: cross_sample
    optional: false
    depends_on: [denoise_unoise3]
    inputs:
      asv_fasta:
        type: file
        format: fasta
        aggregate: per_sample_outputs
    outputs:
      combined_fasta:
        type: file
        format: fasta
        contract: {min_size: "100B"}
        path: "{outdir}/05b_phylogeny/combined.fasta"
      output_dir:
        type: directory
        path: "{outdir}/05b_phylogeny"
    assertions:
      - "output_dir.exists()"

  # ── Phylogeny Alignment ─────────────────────────────────────────────
  phylogeny_mafft:
    tool_id: phylogeny_mafft
    platforms: [illumina]
    category: phylogeny
    scope: cross_sample
    optional: false
    depends_on: [phylogeny_combine]
    inputs:
      combined_fasta:
        type: file
        format: fasta
        source: phylogeny_combine.combined_fasta
    outputs:
      aligned_fasta:
        type: file
        format: fasta
        contract: {min_size: "100B"}
        path: "{outdir}/05b_phylogeny/aligned.fasta"
      output_dir:
        type: directory
        path: "{outdir}/05b_phylogeny"
    assertions:
      - "output_dir.exists()"

  # ── Phylogeny Tree ───────────────────────────────────────────────────
  phylogeny_tree:
    tool_id: phylogeny_tree
    platforms: [illumina]
    category: phylogeny
    scope: cross_sample
    optional: false
    depends_on: [phylogeny_mafft]
    inputs:
      aligned_fasta:
        type: file
        format: fasta
        source: phylogeny_mafft.aligned_fasta
    outputs:
      phylogeny_tree:
        type: file
        format: nwk
        contract: {min_size: "10B"}
        path: "{outdir}/05b_phylogeny/phylogeny.nwk"
      output_dir:
        type: directory
        path: "{outdir}/05b_phylogeny"
    assertions:
      - "output_dir.exists()"

  # ── Diversity Metrics ───────────────────────────────────────────────
  diversity:
    tool_id: diversity_metrics
    platforms: [illumina]
    category: diversity
    scope: cross_sample
    optional: false
    depends_on: [denoise_unoise3, phylogeny_tree]
    params:
      denoise_dir: "{outdir}/04_denoise"
      merge_dir: "{outdir}/02_merge"
    inputs:
      asv_table:        {type: file, format: tsv}
      diversity_script: {type: file, format: py}
      phylogeny_tree:
        type: file
        format: nwk
        source: phylogeny_tree.phylogeny_tree
        optional: true
    outputs:
      alpha_tsv:
        type: file
        format: tsv
        path: "{outdir}/06_diversity/alpha_diversity.tsv"
      beta_tsv:
        type: file
        format: tsv
        path: "{outdir}/06_diversity/beta_diversity.tsv"
      output_dir:
        type: directory
        path: "{outdir}/06_diversity"
    assertions:
      - "output_dir.exists()"
