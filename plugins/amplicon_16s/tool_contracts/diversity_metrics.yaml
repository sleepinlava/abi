abi_version: "0.1"
tool_id: diversity_metrics
name: Diversity Metrics
category: diversity
purpose: Compute alpha and beta diversity metrics from an ASV/OTU abundance table.
when_to_use:
  - community_comparison
  - ecological_analysis
inputs:
  asv_table:
    type: file
    formats: [tsv]
    required: true
  diversity_script:
    type: file
    formats: ["py"]
    required: true
  phylogeny_tree:
    type: file
    formats: [nwk, tree]
    required: false
outputs:
  output_dir:
    type: directory
  alpha_diversity_tsv:
    type: file
    format: tsv
  beta_diversity_tsv:
    type: file
    format: tsv
execution:
  env_name: amplicon
  executable: python
  command_template: "python {diversity_script} --asv-table {asv_table} --output-dir {output_dir} --tree {phylogeny_tree}"
  network: false
  writes_output: true
failure_handling:
  missing_input:
    hint: "ASV table not found. Verify vsearch_denoise or vsearch_otu completed successfully."
  tool_not_found:
    hint: "Python diversity script not found. Ensure DIVERSITY_SCRIPT_NOT_CONFIGURED is replaced with a real script path."
