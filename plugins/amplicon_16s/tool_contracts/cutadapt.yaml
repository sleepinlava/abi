abi_version: "0.1"
tool_id: cutadapt
name: cutadapt
category: qc
purpose: Remove adapter sequences and primers from paired-end amplicon reads.
when_to_use:
  - paired_end_amplicon
  - primer_removal_required
inputs:
  read1:
    type: file
    formats: [fastq, fastq.gz]
    required: true
  read2:
    type: file
    formats: [fastq, fastq.gz]
    required: true
  forward_primer:
    type: string
    required: true
  reverse_primer:
    type: string
    required: true
  sample_id:
    type: string
    required: true
  threads:
    type: integer
    minimum: 1
    default: 4
outputs:
  output_dir:
    type: directory
  trimmed_read1:
    type: file
    format: fastq.gz
  trimmed_read2:
    type: file
    format: fastq.gz
execution:
  env_name: amplicon
  executable: cutadapt
  command_template: "cutadapt -g {forward_primer} -G {reverse_primer} -o {output_dir}/{sample_id}_R1.trimmed.fastq.gz -p {output_dir}/{sample_id}_R2.trimmed.fastq.gz {read1} {read2} --cores {threads} --minimum-length 50"
  network: false
  writes_output: true
failure_handling:
  missing_input:
    hint: "Check sample sheet read1/read2 paths."
  tool_not_found:
    hint: "Install cutadapt in the amplicon environment: conda install -c bioconda cutadapt"

resources:
  cpu: 4
  memory: "4GB"
  walltime: "01:00:00"
