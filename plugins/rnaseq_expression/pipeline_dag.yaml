# ============================================================================
# RNA-seq Expression Pipeline DAG — Canonical Specification
# ============================================================================
# Generated 2026-06-17.  Updated 2026-06-18 with scope, category_dirs, and
# path templates for the universal DAG planner (abi.dag_planner).
# ============================================================================

abi_version: "0.1"
pipeline_id: rnaseq_expression
pipeline_name: "Standard RNA-seq Differential Expression Pipeline"

platforms:
  - illumina

# Category → subdirectory mapping (drives output path construction).
category_dirs:
  qc: 01_qc
  alignment: 02_alignment
  expression: 03_expression
  preprocessing: 03_expression
  differential_expression: 04_differential_expression

standard_tables:
  gene_expression:
    description: "Per-gene raw counts from featureCounts"
  differential_expression:
    description: "DESeq2 results with log2FC, p-value, padj"

nodes:
  # ── QC ──────────────────────────────────────────────────────────────
  qc_fastp:
    tool_id: fastp
    platforms: [illumina]
    category: qc
    scope: per_sample
    optional: false
    depends_on: []
    inputs:
      read1:  {type: file, format: fastq.gz, source: sample_sheet}
      read2:  {type: file, format: fastq.gz, source: sample_sheet}
    outputs:
      clean_read1:
        type: file
        format: fastq.gz
        path: "{outdir}/{category_dir}/{sample_id}/{sample_id}_R1.clean.fastq.gz"
      clean_read2:
        type: file
        format: fastq.gz
        path: "{outdir}/{category_dir}/{sample_id}/{sample_id}_R2.clean.fastq.gz"
      output_dir:
        type: directory
        path: "{outdir}/{category_dir}/{sample_id}"
    assertions:
      - "output_files.output_dir exists"

  # ── Alignment ───────────────────────────────────────────────────────
  alignment_star:
    tool_id: star
    platforms: [illumina]
    category: alignment
    scope: per_sample
    optional: false
    depends_on: [qc_fastp]
    params:
      output_prefix: "{outdir}/{category_dir}/{sample_id}/{sample_id}."
    inputs:
      read1:  {type: file, format: fastq.gz, source: qc_fastp.clean_read1}
      read2:  {type: file, format: fastq.gz, source: qc_fastp.clean_read2}
      genome_index: {type: directory}
    outputs:
      bam:
        type: file
        format: bam
        contract: {min_size: "1B"}
        path: "{outdir}/{category_dir}/{sample_id}/{sample_id}.Aligned.sortedByCoord.out.bam"
      output_dir:
        type: directory
        path: "{outdir}/{category_dir}/{sample_id}"
    assertions:
      - "output_files.output_dir exists"

  # ── Quantification ──────────────────────────────────────────────────
  quant_featurecounts:
    tool_id: featurecounts
    platforms: [illumina]
    category: expression
    scope: per_sample
    optional: false
    depends_on: [alignment_star]
    inputs:
      bam:             {type: file, format: bam, source: alignment_star.bam}
      annotation_gtf:  {type: file, format: gtf}
    outputs:
      counts:
        type: file
        format: tsv
        contract: {min_size: "100B"}
        path: "{outdir}/{category_dir}/{sample_id}/{sample_id}.featureCounts.txt"
      output_dir:
        type: directory
        path: "{outdir}/{category_dir}/{sample_id}"
    assertions:
      - "output_files.output_dir exists"

  # ── Count Matrix Assembly ────────────────────────────────────────────
  build_matrix:
    tool_id: build_count_matrix
    platforms: [illumina]
    category: preprocessing
    scope: cross_sample
    optional: false
    depends_on: [quant_featurecounts]
    inputs:
      expression_dir:
        type: directory
        path: "{outdir}/03_expression"
      sample_sheet:        {type: file, format: tsv}
      count_matrix_script: {type: file, format: py}
    outputs:
      count_matrix:
        type: file
        format: tsv
        contract: {min_size: "100B"}
        path: "{outdir}/04_differential_expression/count_matrix.tsv"
      sample_metadata:
        type: file
        format: tsv
        contract: {min_size: "20B"}
        path: "{outdir}/04_differential_expression/sample_metadata.tsv"
      output_dir:
        type: directory
        path: "{outdir}/04_differential_expression"
    assertions:
      - "output_files.output_dir exists"

  # ── Differential Expression ─────────────────────────────────────────
  de_deseq2:
    tool_id: deseq2
    platforms: [illumina]
    category: differential_expression
    scope: cross_sample
    optional: false
    depends_on: [build_matrix]
    config_params:
      comparison: differential_expression.comparison
      alpha: differential_expression.alpha
    inputs:
      count_matrix:     {type: file, format: tsv, source: build_matrix.count_matrix}
      sample_metadata:  {type: file, format: tsv, source: build_matrix.sample_metadata}
      deseq2_script:    {type: file, format: R}
    outputs:
      de_results:
        type: file
        format: tsv
        contract: {min_size: "100B"}
        path: "{outdir}/04_differential_expression/deseq2_results.tsv"
      output_dir:
        type: directory
        path: "{outdir}/04_differential_expression"
    assertions:
      - "output_files.output_dir exists"
