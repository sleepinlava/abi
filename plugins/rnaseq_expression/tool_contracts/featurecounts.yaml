abi_version: '0.1'
tool_id: featurecounts
name: featureCounts
category: expression
purpose: Count reads overlapping gene annotations from an aligned BAM file.
when_to_use:
- gene_expression_quantification
inputs:
  bam:
    type: file
    format: bam
    required: true
  annotation_gtf:
    type: file
    format: gtf
    required: true
  threads:
    type: integer
    minimum: 1
outputs:
  counts:
    type: file
    format: txt
execution:
  executable: featureCounts
  command_template: >-
    sh -c 'tmp="$3.stderr.tmp"; if featureCounts -T "$1" -p -a "$2" -o "$3" "$4" 2>"$tmp"; then cat "$tmp" >&2; rm -f "$tmp"; exit 0; fi; rc=$?; if grep -q "No paired-end reads were detected" "$tmp"; then cat "$tmp" >&2; echo "ABI: retrying featureCounts without -p because BAM has no paired-end flags" >&2; rm -f "$tmp"; featureCounts -T "$1" -a "$2" -o "$3" "$4"; else cat "$tmp" >&2; rm -f "$tmp"; exit "$rc"; fi' featurecounts {threads} {annotation_gtf} {counts} {bam}
  network: false
  writes_output: true
normalization:
  tables:
  - gene_expression
failure_handling:
  missing_input:
    hint: Check that the alignment step produced the BAM path in the plan.
  missing_resource:
    hint: Configure resources.annotation_gtf to a valid GTF annotation.
  tool_not_found:
    hint: Install featureCounts in the abi-stats environment.
  parse_failed:
    hint: Check the featureCounts output format before normalizing gene_expression.tsv.
resources:
  cpu: 4
  memory: 8GB
  walltime: "02:00:00"
