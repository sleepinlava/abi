abi_version: "0.1"
tool_id: deseq2
name: DESeq2
category: differential_expression
purpose: Perform differential gene expression analysis using DESeq2 median-of-ratios normalisation and Wald test.
when_to_use:
  - multi_group_comparison
  - differential_expression_required
inputs:
  count_matrix:
    type: file
    formats: [tsv]
    required: true
  sample_metadata:
    type: file
    formats: [tsv]
    required: true
  deseq2_script:
    type: file
    formats: ["R"]
    required: true
  comparison:
    type: string
    required: true
  alpha:
    type: number
    default: 0.05
outputs:
  output_dir:
    type: directory
  de_results:
    type: file
    format: tsv
execution:
  env_name: rnaseq
  executable: Rscript
  command_template: "Rscript {deseq2_script} --counts {count_matrix} --metadata {sample_metadata} --output {output_dir} --comparison {comparison} --alpha {alpha}"
  network: false
  writes_output: true
failure_handling:
  missing_input:
    hint: "One or both of count_matrix or sample_metadata files are missing. Verify featureCounts completed successfully."
  tool_not_found:
    hint: "Rscript or DESeq2 package not available. Ensure R is installed and DESeq2 is installed (BiocManager::install('DESeq2'))."
  execution_error:
    hint: "DESeq2 execution failed. Check that sample_metadata groups match count_matrix columns and there are at least 2 replicates per group."
