abi_version: "0.1"
plugin_id: rnaseq_expression
display_name: RNA-seq Gene Expression Quantification
description: "Standard RNA-seq pipeline: QC (fastp) → alignment (STAR) → quantification (featureCounts) → differential expression (DESeq2)."
report_title: RNA-seq Gene Expression ABI Report
plugin_type: standalone
entry_point: abi.plugins.rnaseq_expression:RNASeqExpressionPlugin
tool_registry: tool_registry.yaml
standard_tables: standard_tables.yaml
tool_contracts: tool_contracts
core_contracts:
  - fastp
  - star
  - featurecounts
  - deseq2

# ═══════════════════════════════════════════════════════════════════════════
# Workflow declaration — literature-backed, plugin-author-maintained.
# ═══════════════════════════════════════════════════════════════════════════
workflow:
  name: "Standard RNA-seq Differential Expression Pipeline"
  citation: "Conesa et al. 2016, Genome Biology, doi:10.1186/s13059-016-0881-8"
  note: >
    Covers the complete gene-level RNA-seq workflow from raw reads to
    differential expression.  STAR is the default aligner (Dobin et al.
    2013); HISAT2 (Kim et al. 2019) can be substituted via config.
    DESeq2 performs median-of-ratios normalisation and Wald-test
    differential expression (Love et al. 2014).
  steps:
    - id: qc
      tool: fastp
      after: []
      optional: false
      citation: "Chen et al. 2018, Bioinformatics, doi:10.1093/bioinformatics/bty560"
    - id: alignment
      tool: star
      after: [qc]
      optional: false
      citation: "Dobin et al. 2013, Bioinformatics, doi:10.1093/bioinformatics/bts635"
    - id: quantification
      tool: featurecounts
      after: [alignment]
      optional: false
      citation: "Liao et al. 2014, Bioinformatics, doi:10.1093/bioinformatics/btt656"
    - id: differential_expression
      tool: deseq2
      after: [quantification]
      optional: false
      citation: "Love et al. 2014, Genome Biology, doi:10.1186/s13059-014-0550-8"
