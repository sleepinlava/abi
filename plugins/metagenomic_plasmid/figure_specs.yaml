# Figure specifications for the metagenomic_plasmid plugin.
# Each figure is rendered from a standard table by abi_sciplot.
# See: docs/en/abi_sciplot_design.md
#
# Note: qc_summary and assembly_summary use key-value schema (metric/value columns).
# Bar charts render metric names on the x-axis and values on the y-axis.

figures:
  # ── QC ──
  - id: qc_read_retention
    type: bar
    source_table: qc_summary
    x: metric
    y: value
    title: "Reads Retained After QC"
    xlabel: "Metric"
    ylabel: "Value"
    required: false

  # ── Assembly ──
  - id: assembly_n50
    type: bar
    source_table: assembly_summary
    x: metric
    y: value
    title: "Assembly Metrics per Sample"
    xlabel: "Metric"
    ylabel: "Value"
    sort_by: value
    ascending: false
    required: false

  # ── Plasmid detection ──
  - id: plasmid_length_distribution
    type: bar
    source_table: plasmid_predictions
    x: contig_id
    y: contig_length
    title: "Plasmid Contig Length Distribution"
    xlabel: "Contig"
    ylabel: "Length (bp)"
    sort_by: contig_length
    ascending: false
    required: false

  - id: plasmid_score_distribution
    type: scatter
    source_table: plasmid_predictions
    x: contig_length
    y: score
    title: "Plasmid Score vs Contig Length"
    xlabel: "Contig Length (bp)"
    ylabel: "Plasmid Score"
    required: false

  # ── AMR annotations ──
  - id: amr_heatmap
    type: heatmap
    source_table: annotations
    x: sample_id
    title: "AMR Gene Presence Heatmap"
    colormap: "Reds"
    top_n: 50
    required: false

  # ── Plasmid abundance ──
  - id: plasmid_abundance_heatmap
    type: heatmap
    source_table: abundance
    x: feature_id
    title: "Plasmid Abundance Heatmap"
    colormap: "viridis"
    top_n: 50
    required: false
