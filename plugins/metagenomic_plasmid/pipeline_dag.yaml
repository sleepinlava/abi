abi_version: '0.1'
pipeline_id: metagenomic_plasmid
pipeline_name: AutoPlasm — Metagenomic Plasmid Analysis
description: 'Complete metagenomic plasmid detection, binning, typing, annotation,
  host-linking, abundance estimation, and comparative genomics pipeline supporting
  Illumina, ONT, PacBio HiFi, Hybrid, and Assembly-only inputs.

  '
platforms:
- illumina
- ont
- pacbio_hifi
- hybrid
- assembly
standard_tables:
  plasmid_predictions:
    description: Per-contig plasmid predictions from detection tools
    schema:
    - contig_id
    - sample_id
    - tool_id
    - plasmid_score
    - classification
    - length
    - gc_content
  plasmid_consensus:
    description: Consensus plasmid calls across multiple detection tools
    schema:
    - contig_id
    - sample_id
    - plasmid_call
    - supporting_tools
    - conflicting_tools
    - consensus_method
    - length
    - gc_content
  plasmid_bins:
    description: Plasmid bin assignments from reconstruction tools
    schema:
    - bin_id
    - sample_id
    - contig_ids
    - tool_id
    - completeness
    - contamination
    - plasmid_count
  plasmid_typing:
    description: Plasmid replicon/MOB/PTU typing results
    schema:
    - contig_id
    - sample_id
    - tool_id
    - replicon_type
    - mob_type
    - ptu
    - identity
    - coverage
  annotations:
    description: Gene annotations on plasmid contigs
    schema:
    - contig_id
    - sample_id
    - gene_id
    - tool_id
    - product
    - arg_class
    - vf_class
    - mobile_element_type
    - start
    - end
    - strand
  host_predictions:
    description: Predicted host organisms
    schema:
    - sample_id
    - tool_id
    - taxon_name
    - taxon_id
    - rank
    - abundance
    - detection_method
  host_genomes:
    description: MAG-based host genome bins
    schema:
    - bin_id
    - sample_id
    - completeness
    - contamination
    - taxonomy
    - genome_size
    - n50
    - gc_content
  plasmid_host_links:
    description: Plasmid-to-host linkage evidence
    schema:
    - plasmid_id
    - host_id
    - sample_id
    - evidence_type
    - score
    - supporting_data
  abundance:
    description: Plasmid contig abundance per sample
    schema:
    - contig_id
    - sample_id
    - rpkm
    - tpm
    - coverage
    - raw_count
    - mapper
  sample_diversity:
    description: Alpha/beta diversity across samples
    schema:
    - sample_id
    - metric
    - value
    - group
  differential_abundance:
    description: Differential plasmid abundance between groups
    schema:
    - contig_id
    - group1
    - group2
    - log2fc
    - pvalue
    - padj
    - method
  network_edges:
    description: Plasmid co-occurrence network edges
    schema:
    - source
    - target
    - weight
    - correlation_method
    - pvalue
  network_nodes:
    description: Plasmid co-occurrence network node attributes
    schema:
    - node_id
    - degree
    - betweenness
    - cluster
    - plasmid_type
  plasmid_clusters:
    description: Plasmid sequence clusters across samples
    schema:
    - cluster_id
    - member_id
    - sample_id
    - identity
    - coverage
    - method
  assembly_summary:
    description: Assembly QC metrics
    schema:
    - sample_id
    - assembler
    - total_contigs
    - total_length
    - n50
    - n90
    - max_contig
    - gc_content
  qc_summary:
    description: Read QC metrics per sample
    schema:
    - sample_id
    - tool_id
    - raw_reads
    - clean_reads
    - q20
    - q30
    - gc_content
    - read_length_mean
category_dirs:
  abundance: 10_abundance
  annotation: 08_annotation
  assembly: 02_assembly
  assembly_qc: 03_assembly_qc
  comparative_genomics: 09_comparative_genomics
  diversity: 11_diversity
  host_prediction: 07_host_prediction
  input_validation: 00_input_validation
  network: 12_network
  plasmid_binning: 05_plasmid_binning
  plasmid_detection: 04_plasmid_detection
  qc: 01_qc
  report: report
  typing: 06_plasmid_typing
  visualization: 13_visualization
nodes:
  qc_fastp:
    tool_id: fastp
    category: qc
    scope: per_sample
    name: fastp adapter trimming + quality filtering
    platforms:
    - illumina
    - hybrid
    optional: false
    depends_on: []
    inputs:
      read1:
        type: file
        format: fastq
        contract:
          min_size: 1KB
          extensions:
          - .fastq
          - .fastq.gz
          - .fq
          - .fq.gz
        source: sample_sheet
      read2:
        type: file
        format: fastq
        contract:
          min_size: 1KB
          extensions:
          - .fastq
          - .fastq.gz
          - .fq
          - .fq.gz
        source: sample_sheet
      sample_id:
        type: string
        source: sample_sheet
      threads:
        type: integer
        default: 1
    outputs:
      clean_read1:
        type: file
        format: fastq.gz
        contract:
          min_size: 1KB
      clean_read2:
        type: file
        format: fastq.gz
        contract:
          min_size: 1KB
      html_report:
        type: file
        format: html
      json_report:
        type: file
        format: json
        contract:
          required_keys:
          - summary
          schema:
            summary.before_filtering.total_reads:
              type: integer
              min: 0
            summary.after_filtering.total_reads:
              type: integer
              min: 0
    assertions:
    - output_json.summary.after_filtering.total_reads > 0
    - output_json.summary.after_filtering.total_reads <= output_json.summary.before_filtering.total_reads
  qc_fastqc_raw:
    tool_id: fastqc
    category: qc
    scope: per_sample
    name: FastQC on raw reads
    platforms:
    - illumina
    - hybrid
    optional: true
    depends_on: []
    inputs:
      read1:
        type: file
        source: sample_sheet
      read2:
        type: file
        source: sample_sheet
    outputs:
      output_dir:
        type: directory
        contract:
          contains:
          - fastqc_data.txt
          - summary.txt
    enable_condition:
      field: qc.run_fastqc
      operator: value
      value: true
  qc_fastqc_clean:
    tool_id: fastqc
    category: qc
    scope: per_sample
    name: FastQC on cleaned reads
    platforms:
    - illumina
    - hybrid
    optional: true
    depends_on:
    - qc_fastp
    inputs:
      read1:
        type: file
        source: qc_fastp.clean_read1
      read2:
        type: file
        source: qc_fastp.clean_read2
    outputs:
      output_dir:
        type: directory
        contract:
          contains:
          - fastqc_data.txt
          - summary.txt
    enable_condition:
      field: qc.run_fastqc
      operator: value
      value: true
  qc_multiqc_illumina:
    tool_id: multiqc
    category: qc
    scope: per_sample
    name: MultiQC aggregation (Illumina)
    platforms:
    - illumina
    - hybrid
    optional: true
    depends_on:
    - qc_fastp
    - qc_fastqc_raw
    - qc_fastqc_clean
    fallback_depends:
    - qc_fastp
    inputs:
      output_dir:
        type: directory
        source: '{project_outdir}/01_qc'
    outputs:
      output_dir:
        type: directory
      multiqc_report:
        type: file
        format: html
    enable_condition:
      field: qc.run_multiqc
      operator: value
      value: true
  qc_nanoplot:
    tool_id: nanoplot
    category: qc
    scope: per_sample
    name: NanoPlot quality report (ONT)
    platforms:
    - ont
    - hybrid
    optional: false
    depends_on: []
    inputs:
      long_reads:
        type: file
        format: fastq
        contract:
          min_size: 1KB
        source: sample_sheet
    outputs:
      output_dir:
        type: directory
  qc_filtlong:
    tool_id: filtlong
    category: qc
    scope: per_sample
    name: Filtlong long-read quality filtering
    platforms:
    - ont
    - hybrid
    optional: false
    depends_on: []
    inputs:
      long_reads:
        type: file
        format: fastq
        contract:
          min_size: 1KB
        source: sample_sheet
    outputs:
      filtered_long_reads:
        type: file
        format: fastq
        contract:
          min_size: 1KB
  qc_multiqc_ont:
    tool_id: multiqc
    category: qc
    scope: per_sample
    name: MultiQC aggregation (ONT)
    platforms:
    - ont
    - hybrid
    optional: true
    depends_on:
    - qc_nanoplot
    - qc_filtlong
    fallback_depends:
    - qc_nanoplot
    inputs:
      output_dir:
        type: directory
        source: '{project_outdir}/01_qc'
    outputs:
      output_dir:
        type: directory
    enable_condition:
      field: qc.run_multiqc
      operator: value
      value: true
  qc_hifiadapterfilt:
    tool_id: hifiadapterfilt
    category: qc
    scope: per_sample
    name: HiFiAdapterFilt adapter removal
    platforms:
    - pacbio_hifi
    optional: false
    depends_on: []
    inputs:
      long_reads:
        type: file
        format: fastq
        contract:
          min_size: 1KB
        source: sample_sheet
    outputs:
      filtered_hifi_reads:
        type: file
        format: fastq.gz
        contract:
          min_size: 1KB
  qc_multiqc_hifi:
    tool_id: multiqc
    category: qc
    scope: per_sample
    name: MultiQC aggregation (HiFi)
    platforms:
    - pacbio_hifi
    optional: true
    depends_on:
    - qc_hifiadapterfilt
    inputs:
      output_dir:
        type: directory
        source: '{project_outdir}/01_qc'
    outputs:
      output_dir:
        type: directory
    enable_condition:
      field: qc.run_multiqc
      operator: value
      value: true
  host_removal_bowtie2:
    tool_id: bowtie2
    category: host_removal
    scope: per_sample
    name: Bowtie2 host read removal (short reads)
    platforms:
    - illumina
    - hybrid
    optional: true
    enable_condition:
      field: host_removal.host_reference
      operator: not_empty
    depends_on:
    - qc_fastp
    inputs:
      read1:
        type: file
        format: fastq.gz
        source: qc_fastp.clean_read1
      read2:
        type: file
        format: fastq.gz
        source: qc_fastp.clean_read2
      host_reference:
        type: file
        format: fasta_index
        contract:
          extensions:
          - .bt2
          min_files: 4
        source: config.resources.host_reference
      threads:
        type: integer
        default: 1
    outputs:
      clean_read1:
        type: file
        format: fastq.gz
        contract:
          min_size: 1KB
      clean_read2:
        type: file
        format: fastq.gz
        contract:
          min_size: 1KB
      host_reads:
        type: file
        format: fastq.gz
      alignment_rate:
        type: file
        format: log
    assertions:
    - output_files.clean_read1 exists
    - output_files.clean_read2 exists
  host_removal_minimap2_long:
    tool_id: minimap2
    category: host_removal
    scope: per_sample
    name: minimap2 host read removal (long reads)
    platforms:
    - ont
    - pacbio_hifi
    - hybrid
    optional: true
    enable_condition:
      field: host_removal.host_reference
      operator: not_empty
    depends_on:
    - qc_filtlong
    inputs:
      long_reads:
        type: file
        format: fastq
        source: qc_filtlong.filtered_long_reads
      host_reference:
        type: file
        format: fasta_index
        contract:
          extensions:
          - .mmi
          min_files: 1
        source: config.resources.host_reference
      threads:
        type: integer
        default: 1
    outputs:
      clean_long_reads:
        type: file
        format: fastq
        contract:
          min_size: 1KB
      host_reads:
        type: file
        format: fastq
  assembly_megahit:
    tool_id: megahit
    category: assembly
    scope: per_sample
    name: MEGAHIT short-read metagenomic assembly
    platforms:
    - illumina
    optional: false
    depends_on:
    - host_removal_bowtie2
    fallback_depends:
    - qc_fastp
    inputs:
      read1:
        type: file
        format: fastq.gz
        source: host_removal_bowtie2.clean_read1
        fallback: qc_fastp.clean_read1
      read2:
        type: file
        format: fastq.gz
        source: host_removal_bowtie2.clean_read2
        fallback: qc_fastp.clean_read2
      threads:
        type: integer
        default: 1
    outputs:
      assembly:
        type: file
        format: fasta
        contract:
          min_size: 500B
          min_contigs: 1
        path: '{outdir}/{category_dir}/{sample_id}/final.contigs.fa'
      output_dir:
        type: directory
  assembly_metaspades:
    tool_id: metaspades
    category: assembly
    scope: per_sample
    name: metaSPAdes short-read metagenomic assembly (alternative)
    platforms:
    - illumina
    optional: true
    enable_condition:
      field: assembly.short_read_assembler
      value: metaspades
    depends_on:
    - host_removal_bowtie2
    fallback_depends:
    - qc_fastp
    inputs:
      read1:
        type: file
        format: fastq.gz
        source: host_removal_bowtie2.clean_read1
        fallback: qc_fastp.clean_read1
      read2:
        type: file
        format: fastq.gz
        source: host_removal_bowtie2.clean_read2
        fallback: qc_fastp.clean_read2
      threads:
        type: integer
        default: 1
    outputs:
      assembly:
        type: file
        format: fasta
        contract:
          min_size: 500B
          min_contigs: 1
      output_dir:
        type: directory
  assembly_metaflye:
    tool_id: metaflye
    category: assembly
    scope: per_sample
    name: metaFlye long-read metagenomic assembly
    platforms:
    - ont
    optional: false
    depends_on:
    - host_removal_minimap2_long
    fallback_depends:
    - qc_filtlong
    inputs:
      long_reads:
        type: file
        format: fastq
        source: host_removal_minimap2_long.clean_long_reads
        fallback: qc_filtlong.filtered_long_reads
      threads:
        type: integer
        default: 1
    outputs:
      assembly:
        type: file
        format: fasta
        contract:
          min_size: 500B
          min_contigs: 1
      output_dir:
        type: directory
  assembly_hifiasm:
    tool_id: hifiasm_meta
    category: assembly
    scope: per_sample
    name: hifiasm-meta HiFi metagenomic assembly
    platforms:
    - pacbio_hifi
    optional: false
    depends_on:
    - host_removal_minimap2_long
    fallback_depends:
    - qc_hifiadapterfilt
    inputs:
      long_reads:
        type: file
        format: fastq.gz
        source: host_removal_minimap2_long.clean_long_reads
        fallback: qc_hifiadapterfilt.filtered_hifi_reads
      threads:
        type: integer
        default: 1
    outputs:
      assembly:
        type: file
        format: fasta
        contract:
          min_size: 500B
          min_contigs: 1
      assembly_graph:
        type: file
        format: gfa
      output_dir:
        type: directory
  assembly_opera_ms:
    tool_id: opera_ms
    category: assembly
    scope: per_sample
    name: OPERA-MS hybrid metagenomic assembly
    platforms:
    - hybrid
    optional: false
    depends_on:
    - host_removal_bowtie2
    - host_removal_minimap2_long
    fallback_depends:
    - qc_fastp
    - qc_filtlong
    inputs:
      read1:
        type: file
        format: fastq.gz
        source: host_removal_bowtie2.clean_read1
        fallback: qc_fastp.clean_read1
      read2:
        type: file
        format: fastq.gz
        source: host_removal_bowtie2.clean_read2
        fallback: qc_fastp.clean_read2
      long_reads:
        type: file
        format: fastq
        source: host_removal_minimap2_long.clean_long_reads
        fallback: qc_filtlong.filtered_long_reads
      threads:
        type: integer
        default: 1
    outputs:
      assembly:
        type: file
        format: fasta
        contract:
          min_size: 500B
          min_contigs: 1
      output_dir:
        type: directory
  assembly_provided:
    tool_id: internal
    category: assembly
    scope: per_sample
    name: Use provided assembly FASTA
    platforms:
    - assembly
    optional: false
    depends_on: []
    inputs:
      assembly:
        type: file
        format: fasta
        contract:
          min_size: 500B
          min_contigs: 1
        source: sample_sheet
    outputs:
      assembly:
        type: file
        format: fasta
  assembly_qc_quast:
    tool_id: quast
    category: assembly_qc
    scope: per_sample
    name: QUAST/metaQUAST assembly quality assessment
    platforms:
    - illumina
    - ont
    - pacbio_hifi
    - hybrid
    - assembly
    optional: false
    depends_on:
    - assembly_megahit
    - assembly_metaspades
    - assembly_metaflye
    - assembly_hifiasm
    - assembly_opera_ms
    - assembly_provided
    inputs:
      assembly:
        type: file
        format: fasta
        source: '{active_assembly_node}.assembly'
      threads:
        type: integer
        default: 1
    outputs:
      output_dir:
        type: directory
      quast_report:
        type: file
        format: tsv
        path: '{outdir}/{category_dir}/{sample_id}/report.tsv'
    assertions:
    - output_files.quast_report exists
  contig_coverage_bowtie2:
    tool_id: bowtie2
    category: contig_coverage
    scope: per_sample
    name: Bowtie2 map short reads to assembly contigs
    platforms:
    - illumina
    - hybrid
    optional: false
    depends_on:
    - assembly_megahit
    - assembly_metaspades
    - assembly_opera_ms
    - assembly_provided
    inputs:
      plasmid_contigs:
        type: file
        format: fasta
        source: '{active_assembly_node}.assembly'
        contract:
          min_size: 500B
      read1:
        type: file
        format: fastq.gz
        source: host_removal_bowtie2.clean_read1
        fallback: qc_fastp.clean_read1
      read2:
        type: file
        format: fastq.gz
        source: host_removal_bowtie2.clean_read2
        fallback: qc_fastp.clean_read2
      threads:
        type: integer
        default: 1
    outputs:
      alignment:
        type: file
        format: sam
        contract:
          min_size: 100B
  contig_coverage_minimap2:
    tool_id: minimap2
    category: contig_coverage
    scope: per_sample
    name: minimap2 map long reads to assembly contigs
    platforms:
    - ont
    - pacbio_hifi
    - hybrid
    optional: false
    depends_on:
    - assembly_metaflye
    - assembly_hifiasm
    - assembly_opera_ms
    inputs:
      plasmid_contigs:
        type: file
        format: fasta
        source: '{active_assembly_node}.assembly'
      long_reads:
        type: file
        format: fastq
        source: host_removal_minimap2_long.clean_long_reads
        fallback: qc_filtlong.filtered_long_reads
      threads:
        type: integer
        default: 1
    outputs:
      alignment:
        type: file
        format: sam
        contract:
          min_size: 100B
  contig_coverage_samtools:
    tool_id: samtools
    category: contig_coverage
    scope: per_sample
    name: samtools sort alignment to BAM
    platforms:
    - illumina
    - ont
    - pacbio_hifi
    - hybrid
    optional: false
    depends_on:
    - contig_coverage_bowtie2
    - contig_coverage_minimap2
    inputs:
      alignment:
        type: file
        format: sam
        source: '{active_contig_mapper}.alignment'
      threads:
        type: integer
        default: 1
    outputs:
      bam:
        type: file
        format: bam
        contract:
          min_size: 100B
  contig_coverage_coverm:
    tool_id: coverm
    category: contig_coverage
    scope: per_sample
    name: CoverM contig coverage estimation
    platforms:
    - illumina
    - ont
    - pacbio_hifi
    - hybrid
    optional: false
    depends_on:
    - contig_coverage_samtools
    inputs:
      bam:
        type: file
        format: bam
        source: contig_coverage_samtools.bam
      threads:
        type: integer
        default: 1
    outputs:
      coverage_table:
        type: file
        format: tsv
        contract:
          min_size: 0B
      abundance_tsv:
        type: file
        format: tsv
    assertions:
    - output_files.coverage_table exists
  plasmid_detect_genomad:
    tool_id: genomad
    category: plasmid_detection
    scope: per_sample
    name: geNomad plasmid/virus classification
    platforms:
    - illumina
    - ont
    - pacbio_hifi
    - hybrid
    - assembly
    optional: false
    depends_on:
    - assembly_megahit
    - assembly_metaspades
    - assembly_metaflye
    - assembly_hifiasm
    - assembly_opera_ms
    - assembly_provided
    inputs:
      assembly:
        type: file
        format: fasta
        source: '{active_assembly_node}.assembly'
      database:
        type: directory
        contract:
          contains:
          - version.txt
        source: config.resources.genomad_database
      threads:
        type: integer
        default: 1
    outputs:
      plasmid_summary:
        type: file
        format: tsv
        path: '{outdir}/{category_dir}/{sample_id}/contigs_summary/contigs_plasmid_summary.tsv'
        contract:
          min_size: 50B
      plasmid_contigs:
        type: file
        format: fasta
        path: '{outdir}/{category_dir}/{sample_id}/contigs_summary/contigs_plasmid.fna'
        contract:
          min_size: 50B
      virus_summary:
        type: file
        format: tsv
        path: '{outdir}/{category_dir}/{sample_id}/contigs_summary/contigs_virus_summary.tsv'
        contract:
          min_size: 50B
    assertions:
    - output_files.plasmid_summary exists
  plasmid_detect_plasme:
    tool_id: plasme
    category: plasmid_detection
    scope: per_sample
    name: PLASMe plasmid classification (optional)
    platforms:
    - illumina
    - ont
    - pacbio_hifi
    - hybrid
    - assembly
    optional: true
    depends_on:
    - assembly_qc_quast
    inputs:
      assembly:
        type: file
        format: fasta
        source: '{active_assembly_node}.assembly'
      database:
        type: directory
        source: config.resources.plasme_database
      threads:
        type: integer
        default: 1
    outputs:
      plasme_predictions:
        type: file
        format: tsv
    enable_condition:
      field: plasmid_detection.tools
      operator: list_contains
      value: plasme
  plasmid_detect_plasx:
    tool_id: plasx
    category: plasmid_detection
    scope: per_sample
    name: PlasX plasmid classification (optional)
    platforms:
    - illumina
    - ont
    - pacbio_hifi
    - hybrid
    - assembly
    optional: true
    depends_on:
    - assembly_qc_quast
    inputs:
      assembly:
        type: file
        format: fasta
        source: '{active_assembly_node}.assembly'
      annotations:
        type: file
        source: config.resources.plasx_annotations
