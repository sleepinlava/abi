# ============================================================================
# AutoPlasm Pipeline DAG — Canonical Specification
# ============================================================================
#
# This is the SINGLE SOURCE OF TRUTH for the metagenomic plasmid analysis
# workflow. The planner reads this spec to generate execution steps; the
# executor enforces the contracts declared on every edge.
#
# Schema versioning: bump when the spec format changes.
# Tool registry and tool_contracts/ must be kept in sync with this file.
#
# ============================================================================
# Design Principles
# ============================================================================
#
# 1. Every node declares:
#    - tool_id          → matches tool_registry.yaml + tool_contracts/<id>.yaml
#    - platforms        → which data platforms activate this node
#    - depends_on       → explicit upstream nodes (by node_id)
#    - inputs           → parameter names + contract (type, format, source)
#    - outputs          → produced artifacts + contract (type, min_size, schema)
#    - assertions       → runtime predicates that MUST pass for step success
#    - optional         → whether the node can be skipped by config
#
# 2. Every edge is EXPLICIT — no path-matching heuristics.
#    The DAG engine validates:
#    a) Upstream output exists and matches its contract (file size, format)
#    b) Downstream input checksum matches upstream output checksum
#    c) Node assertions pass before downstream nodes execute
#
# 3. Platform routing is declarative.
#    The planner filters nodes by `platforms` field, then resolves
#    `depends_on` to produce a topologically ordered step list.
#
# 4. Optional nodes use `fallback_depends`.
#    When an optional node is disabled, downstream nodes that depend on it
#    fall back to their `fallback_depends` (typically the preceding required
#    node in the same data-flow chain).
#
# ============================================================================

abi_version: "0.1"
pipeline_id: metagenomic_plasmid
pipeline_name: "AutoPlasm — Metagenomic Plasmid Analysis"
description: >
  Complete metagenomic plasmid detection, binning, typing, annotation,
  host-linking, abundance estimation, and comparative genomics pipeline
  supporting Illumina, ONT, PacBio HiFi, Hybrid, and Assembly-only inputs.

# Supported input data platforms
platforms:
  - illumina        # Paired-end / single-end short reads
  - ont             # Oxford Nanopore long reads
  - pacbio_hifi     # PacBio HiFi / CCS reads
  - hybrid          # Short + long reads combined
  - assembly        # Pre-assembled contigs (skip assembly step)

# ============================================================================
# Standard Tables (produced across multiple nodes, assembled at end)
# ============================================================================
standard_tables:
  plasmid_predictions:
    description: "Per-contig plasmid predictions from detection tools"
    schema: [contig_id, sample_id, tool_id, plasmid_score, classification, length, gc_content]
  plasmid_consensus:
    description: "Consensus plasmid calls across multiple detection tools"
    schema: [contig_id, sample_id, plasmid_call, supporting_tools, conflicting_tools, consensus_method, length, gc_content]
  plasmid_bins:
    description: "Plasmid bin assignments from reconstruction tools"
    schema: [bin_id, sample_id, contig_ids, tool_id, completeness, contamination, plasmid_count]
  plasmid_typing:
    description: "Plasmid replicon/MOB/PTU typing results"
    schema: [contig_id, sample_id, tool_id, replicon_type, mob_type, ptu, identity, coverage]
  annotations:
    description: "Gene annotations on plasmid contigs"
    schema: [contig_id, sample_id, gene_id, tool_id, product, arg_class, vf_class, mobile_element_type, start, end, strand]
  host_predictions:
    description: "Predicted host organisms"
    schema: [sample_id, tool_id, taxon_name, taxon_id, rank, abundance, detection_method]
  host_genomes:
    description: "MAG-based host genome bins"
    schema: [bin_id, sample_id, completeness, contamination, taxonomy, genome_size, n50, gc_content]
  plasmid_host_links:
    description: "Plasmid-to-host linkage evidence"
    schema: [plasmid_id, host_id, sample_id, evidence_type, score, supporting_data]
  abundance:
    description: "Plasmid contig abundance per sample"
    schema: [contig_id, sample_id, rpkm, tpm, coverage, raw_count, mapper]
  sample_diversity:
    description: "Alpha/beta diversity across samples"
    schema: [sample_id, metric, value, group]
  differential_abundance:
    description: "Differential plasmid abundance between groups"
    schema: [contig_id, group1, group2, log2fc, pvalue, padj, method]
  network_edges:
    description: "Plasmid co-occurrence network edges"
    schema: [source, target, weight, correlation_method, pvalue]
  network_nodes:
    description: "Plasmid co-occurrence network node attributes"
    schema: [node_id, degree, betweenness, cluster, plasmid_type]
  plasmid_clusters:
    description: "Plasmid sequence clusters across samples"
    schema: [cluster_id, member_id, sample_id, identity, coverage, method]
  assembly_summary:
    description: "Assembly QC metrics"
    schema: [sample_id, assembler, total_contigs, total_length, n50, n90, max_contig, gc_content]
  qc_summary:
    description: "Read QC metrics per sample"
    schema: [sample_id, tool_id, raw_reads, clean_reads, q20, q30, gc_content, read_length_mean]

# ============================================================================
# Node Definitions
# ============================================================================
nodes:

  # =========================================================================
  # SECTION 01: Quality Control (QC)
  # =========================================================================

  # --- Illumina QC ---
  qc_fastp:
    tool_id: fastp
    category: qc
    name: "fastp adapter trimming + quality filtering"
    platforms: [illumina, hybrid]
    optional: false
    depends_on: []
    inputs:
      read1:
        type: file
        format: fastq
        contract: {min_size: "1KB", extensions: [.fastq, .fastq.gz, .fq, .fq.gz]}
        source: sample_sheet
      read2:
        type: file
        format: fastq
        contract: {min_size: "1KB", extensions: [.fastq, .fastq.gz, .fq, .fq.gz]}
        source: sample_sheet
      sample_id:
        type: string
        source: sample_sheet
      threads:
        type: integer
        default: 1
    outputs:
      clean_read1:
        type: file
        format: fastq.gz
        contract: {min_size: "1KB"}
      clean_read2:
        type: file
        format: fastq.gz
        contract: {min_size: "1KB"}
      html_report:
        type: file
        format: html
      json_report:
        type: file
        format: json
        contract:
          required_keys: [summary]
          schema:
            summary.before_filtering.total_reads: {type: integer, min: 0}
            summary.after_filtering.total_reads: {type: integer, min: 0}
    assertions:
      - "output_json.summary.after_filtering.total_reads > 0"
      - "output_json.summary.after_filtering.total_reads <= output_json.summary.before_filtering.total_reads"

  qc_fastqc_raw:
    tool_id: fastqc
    category: qc
    name: "FastQC on raw reads"
    platforms: [illumina, hybrid]
    optional: true
    depends_on: []
    inputs:
      read1: {type: file, source: sample_sheet}
      read2: {type: file, source: sample_sheet}
    outputs:
      output_dir: {type: directory, contract: {contains: ["fastqc_data.txt", "summary.txt"]}}

  qc_fastqc_clean:
    tool_id: fastqc
    category: qc
    name: "FastQC on cleaned reads"
    platforms: [illumina, hybrid]
    optional: true
    depends_on: [qc_fastp]
    inputs:
      read1: {type: file, source: qc_fastp.clean_read1}
      read2: {type: file, source: qc_fastp.clean_read2}
    outputs:
      output_dir: {type: directory, contract: {contains: ["fastqc_data.txt", "summary.txt"]}}

  qc_multiqc_illumina:
    tool_id: multiqc
    category: qc
    name: "MultiQC aggregation (Illumina)"
    platforms: [illumina, hybrid]
    optional: true
    depends_on:
      - qc_fastp
      - qc_fastqc_raw
      - qc_fastqc_clean
    # MultiQC can run even if FastQC was skipped — it aggregates what exists
    fallback_depends: [qc_fastp]
    inputs:
      output_dir:
        type: directory
        source: "{project_outdir}/01_qc"
    outputs:
      output_dir: {type: directory}
      multiqc_report: {type: file, format: html}

  # --- ONT QC ---
  qc_nanoplot:
    tool_id: nanoplot
    category: qc
    name: "NanoPlot quality report (ONT)"
    platforms: [ont, hybrid]
    optional: false
    depends_on: []
    inputs:
      long_reads:
        type: file
        format: fastq
        contract: {min_size: "1KB"}
        source: sample_sheet
    outputs:
      output_dir: {type: directory}

  qc_filtlong:
    tool_id: filtlong
    category: qc
    name: "Filtlong long-read quality filtering"
    platforms: [ont, hybrid]
    optional: false
    depends_on: []
    inputs:
      long_reads:
        type: file
        format: fastq
        contract: {min_size: "1KB"}
        source: sample_sheet
    outputs:
      filtered_long_reads:
        type: file
        format: fastq
        contract: {min_size: "1KB"}

  qc_multiqc_ont:
    tool_id: multiqc
    category: qc
    name: "MultiQC aggregation (ONT)"
    platforms: [ont, hybrid]
    optional: true
    depends_on: [qc_nanoplot, qc_filtlong]
    fallback_depends: [qc_nanoplot]
    inputs:
      output_dir:
        type: directory
        source: "{project_outdir}/01_qc"
    outputs:
      output_dir: {type: directory}

  # --- PacBio HiFi QC ---
  qc_hifiadapterfilt:
    tool_id: hifiadapterfilt
    category: qc
    name: "HiFiAdapterFilt adapter removal"
    platforms: [pacbio_hifi]
    optional: false
    depends_on: []
    inputs:
      long_reads:
        type: file
        format: fastq
        contract: {min_size: "1KB"}
        source: sample_sheet
    outputs:
      filtered_hifi_reads:
        type: file
        format: fastq.gz
        contract: {min_size: "1KB"}

  qc_multiqc_hifi:
    tool_id: multiqc
    category: qc
    name: "MultiQC aggregation (HiFi)"
    platforms: [pacbio_hifi]
    optional: true
    depends_on: [qc_hifiadapterfilt]
    inputs:
      output_dir:
        type: directory
        source: "{project_outdir}/01_qc"
    outputs:
      output_dir: {type: directory}

  # =========================================================================
  # SECTION 02: Host / Contamination Removal
  # =========================================================================

  host_removal_bowtie2:
    tool_id: bowtie2
    category: host_removal
    name: "Bowtie2 host read removal (short reads)"
    platforms: [illumina, hybrid]
    optional: true
    enable_condition:
      field: host_removal.host_reference
      operator: not_empty
    depends_on: [qc_fastp]
    inputs:
      read1: {type: file, format: fastq.gz, source: qc_fastp.clean_read1}
      read2: {type: file, format: fastq.gz, source: qc_fastp.clean_read2}
      host_reference:
        type: file
        format: fasta_index
        contract: {extensions: [.bt2], min_files: 4}
        source: config.resources.host_reference
      threads: {type: integer, default: 1}
    outputs:
      clean_read1: {type: file, format: fastq.gz, contract: {min_size: "1KB"}}
      clean_read2: {type: file, format: fastq.gz, contract: {min_size: "1KB"}}
      host_reads: {type: file, format: fastq.gz}
      alignment_rate: {type: file, format: log}
    assertions:
      - "output_files.clean_read1 exists"
      - "output_files.clean_read2 exists"

  host_removal_minimap2_long:
    tool_id: minimap2
    category: host_removal
    name: "minimap2 host read removal (long reads)"
    platforms: [ont, pacbio_hifi, hybrid]
    optional: true
    enable_condition:
      field: host_removal.host_reference
      operator: not_empty
    depends_on: [qc_filtlong]  # or qc_hifiadapterfilt for HiFi
    # For HiFi: depends_on [qc_hifiadapterfilt]
    inputs:
      long_reads:
        type: file
        format: fastq
        source: qc_filtlong.filtered_long_reads
      host_reference:
        type: file
        format: fasta_index
        contract: {extensions: [.mmi], min_files: 1}
        source: config.resources.host_reference
      threads: {type: integer, default: 1}
    outputs:
      clean_long_reads: {type: file, format: fastq, contract: {min_size: "1KB"}}
      host_reads: {type: file, format: fastq}

  # =========================================================================
  # SECTION 03: Assembly
  # =========================================================================

  assembly_megahit:
    tool_id: megahit
    category: assembly
    name: "MEGAHIT short-read metagenomic assembly"
    platforms: [illumina]
    optional: false
    depends_on: [host_removal_bowtie2]
    fallback_depends: [qc_fastp]
    # When host_removal is disabled, use QC'd reads directly
    inputs:
      read1:
        type: file
        format: fastq.gz
        source: host_removal_bowtie2.clean_read1
        fallback: qc_fastp.clean_read1
      read2:
        type: file
        format: fastq.gz
        source: host_removal_bowtie2.clean_read2
        fallback: qc_fastp.clean_read2
      threads: {type: integer, default: 1}
    outputs:
      assembly:
        type: file
        format: fasta
        contract: {min_size: "500B", min_contigs: 1}
      output_dir: {type: directory}

  assembly_metaspades:
    tool_id: metaspades
    category: assembly
    name: "metaSPAdes short-read metagenomic assembly (alternative)"
    platforms: [illumina]
    optional: true
    enable_condition:
      field: assembly.short_read_assembler
      value: metaspades
    depends_on: [host_removal_bowtie2]
    fallback_depends: [qc_fastp]
    inputs:
      read1:
        type: file
        format: fastq.gz
        source: host_removal_bowtie2.clean_read1
        fallback: qc_fastp.clean_read1
      read2:
        type: file
        format: fastq.gz
        source: host_removal_bowtie2.clean_read2
        fallback: qc_fastp.clean_read2
      threads: {type: integer, default: 1}
    outputs:
      assembly: {type: file, format: fasta, contract: {min_size: "500B", min_contigs: 1}}
      output_dir: {type: directory}

  assembly_metaflye:
    tool_id: metaflye
    category: assembly
    name: "metaFlye long-read metagenomic assembly"
    platforms: [ont]
    optional: false
    depends_on: [host_removal_minimap2_long]
    fallback_depends: [qc_filtlong]
    inputs:
      long_reads:
        type: file
        format: fastq
        source: host_removal_minimap2_long.clean_long_reads
        fallback: qc_filtlong.filtered_long_reads
      threads: {type: integer, default: 1}
    outputs:
      assembly: {type: file, format: fasta, contract: {min_size: "500B", min_contigs: 1}}
      output_dir: {type: directory}

  assembly_hifiasm:
    tool_id: hifiasm_meta
    category: assembly
    name: "hifiasm-meta HiFi metagenomic assembly"
    platforms: [pacbio_hifi]
    optional: false
    depends_on: [host_removal_minimap2_long]
    fallback_depends: [qc_hifiadapterfilt]
    inputs:
      long_reads:
        type: file
        format: fastq.gz
        source: host_removal_minimap2_long.clean_long_reads
        fallback: qc_hifiadapterfilt.filtered_hifi_reads
      threads: {type: integer, default: 1}
    outputs:
      assembly: {type: file, format: fasta, contract: {min_size: "500B", min_contigs: 1}}
      assembly_graph: {type: file, format: gfa}
      output_dir: {type: directory}

  assembly_opera_ms:
    tool_id: opera_ms
    category: assembly
    name: "OPERA-MS hybrid metagenomic assembly"
    platforms: [hybrid]
    optional: false
    depends_on:
      - host_removal_bowtie2
      - host_removal_minimap2_long
    fallback_depends:
      - qc_fastp
      - qc_filtlong
    inputs:
      read1:
        type: file
        format: fastq.gz
        source: host_removal_bowtie2.clean_read1
        fallback: qc_fastp.clean_read1
      read2:
        type: file
        format: fastq.gz
        source: host_removal_bowtie2.clean_read2
        fallback: qc_fastp.clean_read2
      long_reads:
        type: file
        format: fastq
        source: host_removal_minimap2_long.clean_long_reads
        fallback: qc_filtlong.filtered_long_reads
      threads: {type: integer, default: 1}
    outputs:
      assembly: {type: file, format: fasta, contract: {min_size: "500B", min_contigs: 1}}
      output_dir: {type: directory}

  # --- Assembly-only input: use provided assembly directly ---
  assembly_provided:
    tool_id: internal
    category: assembly
    name: "Use provided assembly FASTA"
    platforms: [assembly]
    optional: false
    depends_on: []
    inputs:
      assembly:
        type: file
        format: fasta
        contract: {min_size: "500B", min_contigs: 1}
        source: sample_sheet
    outputs:
      assembly: {type: file, format: fasta}

  # =========================================================================
  # SECTION 04: Assembly QC
  # =========================================================================

  assembly_qc_quast:
    tool_id: quast
    category: assembly_qc
    name: "QUAST/metaQUAST assembly quality assessment"
    platforms: [illumina, ont, pacbio_hifi, hybrid, assembly]
    optional: false
    depends_on:
      - assembly_megahit
      - assembly_metaspades
      - assembly_metaflye
      - assembly_hifiasm
      - assembly_opera_ms
      - assembly_provided
    # Resolve to whichever assembly node was actually executed for this platform
    inputs:
      assembly:
        type: file
        format: fasta
        source: "{active_assembly_node}.assembly"
      threads: {type: integer, default: 1}
    outputs:
      output_dir: {type: directory}
      quast_report: {type: file, format: tsv}
    assertions:
      - "output_files.quast_report exists"

  # =========================================================================
  # SECTION 05: Contig Coverage (Read mapping to assembly)
  # =========================================================================

  contig_coverage_bowtie2:
    tool_id: bowtie2
    category: contig_coverage
    name: "Bowtie2 map short reads to assembly contigs"
    platforms: [illumina, hybrid]
    optional: false
    depends_on:
      - assembly_megahit
      - assembly_metaspades
      - assembly_opera_ms
      - assembly_provided
    inputs:
      assembly:
        type: file
        format: fasta
        source: "{active_assembly_node}.assembly"
        contract: {min_size: "500B"}
      read1:
        type: file
        format: fastq.gz
        source: host_removal_bowtie2.clean_read1
        fallback: qc_fastp.clean_read1
      read2:
        type: file
        format: fastq.gz
        source: host_removal_bowtie2.clean_read2
        fallback: qc_fastp.clean_read2
      threads: {type: integer, default: 1}
    outputs:
      alignment: {type: file, format: sam, contract: {min_size: "100B"}}

  contig_coverage_minimap2:
    tool_id: minimap2
    category: contig_coverage
    name: "minimap2 map long reads to assembly contigs"
    platforms: [ont, pacbio_hifi, hybrid]
    optional: false
    depends_on:
      - assembly_metaflye
      - assembly_hifiasm
      - assembly_opera_ms
    inputs:
      assembly:
        type: file
        format: fasta
        source: "{active_assembly_node}.assembly"
      long_reads:
        type: file
        format: fastq
        source: host_removal_minimap2_long.clean_long_reads
        fallback: qc_filtlong.filtered_long_reads
      threads: {type: integer, default: 1}
    outputs:
      alignment: {type: file, format: sam, contract: {min_size: "100B"}}

  contig_coverage_samtools:
    tool_id: samtools
    category: contig_coverage
    name: "samtools sort alignment to BAM"
    platforms: [illumina, ont, pacbio_hifi, hybrid]
    optional: false
    depends_on:
      - contig_coverage_bowtie2
      - contig_coverage_minimap2
    inputs:
      alignment:
        type: file
        format: sam
        source: "{active_contig_mapper}.alignment"
      threads: {type: integer, default: 1}
    outputs:
      bam: {type: file, format: bam, contract: {min_size: "100B"}}

  contig_coverage_coverm:
    tool_id: coverm
    category: contig_coverage
    name: "CoverM contig coverage estimation"
    platforms: [illumina, ont, pacbio_hifi, hybrid]
    optional: false
    depends_on: [contig_coverage_samtools]
    inputs:
      bam:
        type: file
        format: bam
        source: contig_coverage_samtools.bam
      threads: {type: integer, default: 1}
    outputs:
      coverage_table: {type: file, format: tsv, contract: {min_size: "50B"}}
      abundance_tsv: {type: file, format: tsv}
    assertions:
      - "output_files.coverage_table exists"

  # =========================================================================
  # SECTION 06: Plasmid Detection
  # =========================================================================

  plasmid_detect_genomad:
    tool_id: genomad
    category: plasmid_detection
    name: "geNomad plasmid/virus classification"
    platforms: [illumina, ont, pacbio_hifi, hybrid, assembly]
    optional: false
    depends_on: [assembly_qc_quast]
    inputs:
      assembly:
        type: file
        format: fasta
        source: "{active_assembly_node}.assembly"
      database:
        type: directory
        contract: {contains: ["version.txt"]}
        source: config.resources.genomad_database
      threads: {type: integer, default: 1}
    outputs:
      plasmid_summary: {type: file, format: tsv, contract: {min_size: "50B"}}
      plasmid_contigs: {type: file, format: fasta}
      virus_summary: {type: file, format: tsv}
    assertions:
      - "output_files.plasmid_summary exists"

  plasmid_detect_plasme:
    tool_id: plasme
    category: plasmid_detection
    name: "PLASMe plasmid classification (optional)"
    platforms: [illumina, ont, pacbio_hifi, hybrid, assembly]
    optional: true
    depends_on: [assembly_qc_quast]
    inputs:
      assembly:
        type: file
        format: fasta
        source: "{active_assembly_node}.assembly"
      database:
        type: directory
        source: config.resources.plasme_database
      threads: {type: integer, default: 1}
    outputs:
      plasme_predictions: {type: file, format: tsv}

  plasmid_detect_plasx:
    tool_id: plasx
    category: plasmid_detection
    name: "PlasX plasmid classification (optional)"
    platforms: [illumina, ont, pacbio_hifi, hybrid, assembly]
    optional: true
    depends_on: [assembly_qc_quast]
    inputs:
      assembly:
        type: file
        format: fasta
        source: "{active_assembly_node}.assembly"
      annotations:
        type: file
        source: config.resources.plasx_annotations
      model:
        type: file
        source: config.resources.plasx_model
    outputs:
      plasx_predictions: {type: file, format: tsv}

  # =========================================================================
  # SECTION 07: Plasmid Consensus Builder
  # =========================================================================

  plasmid_consensus:
    tool_id: internal
    category: plasmid_consensus
    name: "Plasmid consensus builder — merge predictions from all detection tools"
    platforms: [illumina, ont, pacbio_hifi, hybrid, assembly]
    optional: false
    depends_on:
      - plasmid_detect_genomad
      - plasmid_detect_plasme
      - plasmid_detect_plasx
      - contig_coverage_coverm
    fallback_depends:
      - plasmid_detect_genomad
      - contig_coverage_coverm
    # Runs with at minimum genomad + coverm; merges PLASMe/PlasX results if available
    inputs:
      genomad_summary:
        type: file
        format: tsv
        source: plasmid_detect_genomad.plasmid_summary
      plasme_predictions:
        type: file
        format: tsv
        source: plasmid_detect_plasme.plasme_predictions
        required: false
      plasx_predictions:
        type: file
        format: tsv
        source: plasmid_detect_plasx.plasx_predictions
        required: false
      coverage_table:
        type: file
        format: tsv
        source: contig_coverage_coverm.coverage_table
      consensus_method:
        type: string
        default: intersection
        enum: [intersection, majority_vote, single_tool]
    outputs:
      plasmid_contigs:
        type: file
        format: fasta
        contract: {min_size: "100B"}
      consensus_table:
        type: file
        format: tsv
    standard_tables:
      - plasmid_predictions
      - plasmid_consensus

  # =========================================================================
  # SECTION 08: Plasmid Reconstruction / Binning
  # =========================================================================

  plasmid_binning_plasmaag:
    tool_id: plasmaag
    category: plasmid_binning
    name: "PlasMAAG multi-sample graph-based plasmid binning"
    platforms: [illumina, ont, pacbio_hifi, hybrid, assembly]
    optional: true
    enable_condition:
      field: plasmid_binning.enable
      value: true
    depends_on: [plasmid_consensus]
    inputs:
      plasmid_contigs:
        type: file
        format: fasta
        source: plasmid_consensus.plasmid_contigs
      reads_contigs_table:
        type: file
        format: tsv
        source: contig_coverage_coverm.coverage_table
      threads: {type: integer, default: 1}
    outputs:
      plasmid_bins: {type: directory}

  plasmid_binning_gplas2:
    tool_id: gplas2
    category: plasmid_binning
    name: "gplas2 graph-based plasmid binning"
    platforms: [illumina, ont, pacbio_hifi, hybrid, assembly]
    optional: true
    enable_condition:
      field: plasmid_binning.enable
      value: true
    depends_on: [plasmid_consensus]
    inputs:
      plasmid_contigs:
        type: file
        format: fasta
        source: plasmid_consensus.plasmid_contigs
      assembly_graph:
        type: file
        format: gfa
        source: "{active_assembly_node}.assembly_graph"
        required: false
    outputs:
      plasmid_bins: {type: file, format: tsv}

  plasmid_binning_mob_recon:
    tool_id: mob_suite
    category: plasmid_binning
    name: "MOB-recon plasmid reconstruction"
    platforms: [illumina, ont, pacbio_hifi, hybrid, assembly]
    optional: true
    enable_condition:
      field: plasmid_binning.enable
      value: true
    depends_on: [plasmid_consensus]
    inputs:
      plasmid_contigs:
        type: file
        format: fasta
        source: plasmid_consensus.plasmid_contigs
      database:
        type: directory
        source: config.resources.mob_suite_database
      threads: {type: integer, default: 1}
    outputs:
      output_dir: {type: directory}

  # =========================================================================
  # SECTION 09: Plasmid Typing and Mobility
  # =========================================================================

  typing_plasmidfinder:
    tool_id: plasmidfinder
    category: typing
    name: "PlasmidFinder replicon/Inc typing"
    platforms: [illumina, ont, pacbio_hifi, hybrid, assembly]
    optional: false
    depends_on: [plasmid_consensus]
    inputs:
      plasmid_contigs:
        type: file
        format: fasta
        source: plasmid_consensus.plasmid_contigs
      database:
        type: directory
        source: config.resources.plasmidfinder_database
    outputs:
      typing_results: {type: file, format: tsv}

  typing_mob_typer:
    tool_id: mob_typer
    category: typing
    name: "MOB-typer relaxase/MOB/oriT typing"
    platforms: [illumina, ont, pacbio_hifi, hybrid, assembly]
    optional: false
    depends_on: [plasmid_consensus]
    inputs:
      plasmid_contigs:
        type: file
        format: fasta
        source: plasmid_consensus.plasmid_contigs
    outputs:
      typing_results: {type: file, format: tsv}

  typing_copla:
    tool_id: copla
    category: typing
    name: "COPLA PTU classification"
    platforms: [illumina, ont, pacbio_hifi, hybrid, assembly]
    optional: true
    depends_on: [plasmid_consensus]
    inputs:
      plasmid_contigs:
        type: file
        format: fasta
        source: plasmid_consensus.plasmid_contigs
      refgraph:
        type: file
        source: config.resources.copla_refgraph
      reflist:
        type: file
        source: config.resources.copla_reflist
    outputs:
      typing_results: {type: file, format: tsv}

  # =========================================================================
  # SECTION 10: Host Prediction / Taxonomy Evidence
  # =========================================================================

  host_prediction_metaphlan:
    tool_id: metaphlan
    category: host_prediction
    name: "MetaPhlAn4 taxonomic profiling"
    platforms: [illumina, ont, pacbio_hifi, hybrid]
    optional: false
    depends_on: [host_removal_bowtie2, host_removal_minimap2_long]
    fallback_depends:
      - qc_fastp
      - qc_filtlong
      - qc_hifiadapterfilt
    inputs:
      read1:
        type: file
        format: fastq.gz
        source: host_removal_bowtie2.clean_read1
        fallback: qc_fastp.clean_read1
        required: false
      read2:
        type: file
        format: fastq.gz
        source: host_removal_bowtie2.clean_read2
        fallback: qc_fastp.clean_read2
        required: false
      long_reads:
        type: file
        format: fastq
        source: host_removal_minimap2_long.clean_long_reads
        fallback: qc_filtlong.filtered_long_reads
        required: false
      database:
        type: directory
        source: config.resources.metaphlan_database
      threads: {type: integer, default: 1}
    outputs:
      taxonomy_profile: {type: file, format: tsv}

  host_prediction_kraken2:
    tool_id: kraken2
    category: host_prediction
    name: "Kraken2 taxonomic classification (optional)"
    platforms: [illumina]
    optional: true
    depends_on: [host_removal_bowtie2]
    fallback_depends: [qc_fastp]
    inputs:
      read1:
        type: file
        format: fastq.gz
        source: host_removal_bowtie2.clean_read1
        fallback: qc_fastp.clean_read1
      read2:
        type: file
        format: fastq.gz
        source: host_removal_bowtie2.clean_read2
        fallback: qc_fastp.clean_read2
      database:
        type: directory
        source: config.resources.kraken2_database
      threads: {type: integer, default: 1}
    outputs:
      kraken_report: {type: file, format: tsv}

  host_prediction_plasmidhostfinder:
    tool_id: plasmidhostfinder
    category: host_prediction
    name: "PlasmidHostFinder assembly-based host prediction"
    platforms: [assembly]
    optional: false
    depends_on: [plasmid_consensus]
    inputs:
      plasmid_contigs:
        type: file
        format: fasta
        source: plasmid_consensus.plasmid_contigs
      database:
        type: directory
        source: config.resources.plasmidhostfinder_database
    outputs:
      host_predictions: {type: file, format: tsv}

  # =========================================================================
  # SECTION 11: Annotation
  # =========================================================================

  annotation_prodigal:
    tool_id: prodigal
    category: annotation
    name: "Prodigal gene calling on plasmid contigs"
    platforms: [illumina, ont, pacbio_hifi, hybrid, assembly]
    optional: false
    depends_on: [plasmid_consensus]
    inputs:
      plasmid_contigs:
        type: file
        format: fasta
        source: plasmid_consensus.plasmid_contigs
    outputs:
      gene_calls: {type: file, format: gff}
      protein_seqs: {type: file, format: faa}
      nucleotide_seqs: {type: file, format: ffn}

  annotation_bakta:
    tool_id: bakta
    category: annotation
    name: "Bakta comprehensive plasmid annotation"
    platforms: [illumina, ont, pacbio_hifi, hybrid, assembly]
    optional: false
    depends_on: [plasmid_consensus]
    # Bakta runs its own gene caller internally; does not consume prodigal output
    inputs:
      plasmid_contigs:
        type: file
        format: fasta
        source: plasmid_consensus.plasmid_contigs
      database:
        type: directory
        source: config.resources.bakta_database
      threads: {type: integer, default: 1}
    outputs:
      output_dir: {type: directory}
      annotations: {type: file, format: tsv}

  annotation_amrfinderplus:
    tool_id: amrfinderplus
    category: annotation
    name: "AMRFinderPlus ARG/VF detection"
    platforms: [illumina, ont, pacbio_hifi, hybrid, assembly]
    optional: false
    depends_on: [plasmid_consensus]
    inputs:
      plasmid_contigs:
        type: file
        format: fasta
        source: plasmid_consensus.plasmid_contigs
    outputs:
      arg_vf_results: {type: file, format: tsv}

  annotation_abricate:
    tool_id: abricate
    category: annotation
    name: "ABRicate multi-database ARG/VF screening"
    platforms: [illumina, ont, pacbio_hifi, hybrid, assembly]
    optional: true
    depends_on: [plasmid_consensus]
    inputs:
      plasmid_contigs:
        type: file
        format: fasta
        source: plasmid_consensus.plasmid_contigs
      abricate_db:
        type: string
        default: card
      threads: {type: integer, default: 1}
    outputs:
      screening_results: {type: file, format: tsv}

  annotation_isescan:
    tool_id: isescan
    category: annotation
    name: "ISEScan insertion sequence detection"
    platforms: [illumina, ont, pacbio_hifi, hybrid, assembly]
    optional: true
    depends_on: [plasmid_consensus]
    inputs:
      plasmid_contigs:
        type: file
        format: fasta
        source: plasmid_consensus.plasmid_contigs
    outputs:
      is_results: {type: file, format: tsv}

  annotation_integronfinder:
    tool_id: integronfinder
    category: annotation
    name: "IntegronFinder integron detection"
    platforms: [illumina, ont, pacbio_hifi, hybrid, assembly]
    optional: true
    depends_on: [plasmid_consensus]
    inputs:
      plasmid_contigs:
        type: file
        format: fasta
        source: plasmid_consensus.plasmid_contigs
    outputs:
      integron_results: {type: directory}

  annotation_mob_suite:
    tool_id: mob_suite
    category: annotation
    name: "MOB-suite plasmid annotation and reconstruction"
    platforms: [illumina, ont, pacbio_hifi, hybrid, assembly]
    optional: true
    depends_on: [plasmid_consensus]
    inputs:
      plasmid_contigs:
        type: file
        format: fasta
        source: plasmid_consensus.plasmid_contigs
      database:
        type: directory
        source: config.resources.mob_suite_database
      threads: {type: integer, default: 1}
    outputs:
      output_dir: {type: directory}

  # =========================================================================
  # SECTION 12: MAG / Host Genome Background
  # =========================================================================

  mag_metabat2:
    tool_id: metabat2
    category: mag_host_genomes
    name: "MetaBAT2 metagenomic binning"
    platforms: [illumina, ont, pacbio_hifi, hybrid]
    optional: true
    enable_condition:
      field: mag_host_genomes.enable
      value: true
    depends_on: [contig_coverage_samtools]
    inputs:
      assembly:
        type: file
        format: fasta
        source: "{active_assembly_node}.assembly"
      bam:
        type: file
        format: bam
        source: contig_coverage_samtools.bam
    outputs:
      mag_bins: {type: directory}

  mag_checkm2:
    tool_id: checkm2
    category: mag_host_genomes
    name: "CheckM2 MAG quality assessment"
    platforms: [illumina, ont, pacbio_hifi, hybrid]
    optional: true
    depends_on: [mag_metabat2]
    inputs:
      mag_bins:
        type: directory
        source: mag_metabat2.mag_bins
      threads: {type: integer, default: 1}
    outputs:
      quality_report: {type: file, format: tsv}

  mag_gtdbtk:
    tool_id: gtdbtk
    category: mag_host_genomes
    name: "GTDB-Tk taxonomic classification of MAGs"
    platforms: [illumina, ont, pacbio_hifi, hybrid]
    optional: true
    depends_on: [mag_checkm2]
    inputs:
      mag_bins:
        type: directory
        source: mag_metabat2.mag_bins
      database:
        type: directory
        source: config.resources.gtdbtk_database
      threads: {type: integer, default: 1}
    outputs:
      taxonomy: {type: file, format: tsv}

  # =========================================================================
  # SECTION 13: Host-Plasmid Linking
  # =========================================================================

  host_plasmid_link_coabundance:
    tool_id: internal
    category: host_plasmid_linking
    name: "Co-abundance correlation host-plasmid linking"
    platforms: [illumina, ont, pacbio_hifi, hybrid]
    optional: true
    depends_on:
      - plasmid_consensus
      - contig_coverage_coverm
      - host_prediction_metaphlan
    inputs:
      plasmid_abundance:
        type: file
        format: tsv
        source: contig_coverage_coverm.abundance_tsv
      host_abundance:
        type: file
        format: tsv
        source: host_prediction_metaphlan.taxonomy_profile
      correlation_method:
        type: string
        default: spearman
        enum: [spearman, pearson]
    outputs:
      coabundance_links: {type: file, format: tsv}

  host_plasmid_link_sequence:
    tool_id: internal
    category: host_plasmid_linking
    name: "Sequence similarity host-plasmid linking (k-mer/GC/codon usage)"
    platforms: [illumina, ont, pacbio_hifi, hybrid]
    optional: true
    depends_on:
      - plasmid_consensus
      - mag_gtdbtk
    fallback_depends: [plasmid_consensus]
    inputs:
      plasmid_contigs:
        type: file
        format: fasta
        source: plasmid_consensus.plasmid_contigs
      host_genomes:
        type: directory
        source: mag_metabat2.mag_bins
        required: false
      host_taxonomy:
        type: file
        format: tsv
        source: mag_gtdbtk.taxonomy
        required: false
    outputs:
      sequence_similarity_links: {type: file, format: tsv}

  host_plasmid_link_crispr:
    tool_id: minced
    category: host_plasmid_linking
    name: "CRISPR spacer matching host-plasmid linking"
    platforms: [illumina, ont, pacbio_hifi, hybrid]
    optional: true
    depends_on: [mag_gtdbtk]
    fallback_depends: [plasmid_consensus]
    inputs:
      host_genomes:
        type: directory
        source: mag_metabat2.mag_bins
        required: false
      plasmid_contigs:
        type: file
        format: fasta
        source: plasmid_consensus.plasmid_contigs
    outputs:
      crispr_links: {type: file, format: tsv}

  host_plasmid_link_longread:
    tool_id: internal
    category: host_plasmid_linking
    name: "Long-read bridge evidence host-plasmid linking"
    platforms: [ont, pacbio_hifi, hybrid]
    optional: true
    depends_on:
      - plasmid_consensus
      - contig_coverage_coverm
    inputs:
      plasmid_contigs:
        type: file
        format: fasta
        source: plasmid_consensus.plasmid_contigs
      assembly:
        type: file
        format: fasta
        source: "{active_assembly_node}.assembly"
      alignment:
        type: file
        format: bam
        source: contig_coverage_samtools.bam
    outputs:
      longread_bridge_links: {type: file, format: tsv}

  # =========================================================================
  # SECTION 14: Plasmid Abundance (plasmid-focused, separate from contig coverage)
  # =========================================================================

  abundance_bowtie2:
    tool_id: bowtie2
    category: abundance
    name: "Bowtie2 map reads to plasmid contigs for abundance"
    platforms: [illumina, hybrid]
    optional: false
    depends_on:
      - plasmid_consensus
      - host_removal_bowtie2
    fallback_depends:
      - plasmid_consensus
      - qc_fastp
    inputs:
      plasmid_contigs:
        type: file
        format: fasta
        source: plasmid_consensus.plasmid_contigs
      read1:
        type: file
        format: fastq.gz
        source: host_removal_bowtie2.clean_read1
        fallback: qc_fastp.clean_read1
      read2:
        type: file
        format: fastq.gz
        source: host_removal_bowtie2.clean_read2
        fallback: qc_fastp.clean_read2
      sample_id: {type: string}
      threads: {type: integer, default: 1}
    outputs:
      alignment: {type: file, format: sam, contract: {min_size: "100B"}}

  abundance_minimap2:
    tool_id: minimap2
    category: abundance
    name: "minimap2 map reads to plasmid contigs for abundance"
    platforms: [ont, pacbio_hifi, hybrid]
    optional: false
    depends_on:
      - plasmid_consensus
      - host_removal_minimap2_long
    fallback_depends:
      - plasmid_consensus
      - qc_filtlong
      - qc_hifiadapterfilt
    inputs:
      plasmid_contigs:
        type: file
        format: fasta
        source: plasmid_consensus.plasmid_contigs
      long_reads:
        type: file
        format: fastq
        source: host_removal_minimap2_long.clean_long_reads
        fallback: qc_filtlong.filtered_long_reads
      threads: {type: integer, default: 1}
    outputs:
      alignment: {type: file, format: sam, contract: {min_size: "100B"}}

  abundance_samtools:
    tool_id: samtools
    category: abundance
    name: "samtools sort plasmid alignment to BAM"
    platforms: [illumina, ont, pacbio_hifi, hybrid]
    optional: false
    depends_on: [abundance_bowtie2, abundance_minimap2]
    inputs:
      alignment:
        type: file
        format: sam
        source: "{active_abundance_mapper}.alignment"
      threads: {type: integer, default: 1}
    outputs:
      bam: {type: file, format: bam, contract: {min_size: "100B"}}

  abundance_coverm:
    tool_id: coverm
    category: abundance
    name: "CoverM plasmid abundance estimation"
    platforms: [illumina, ont, pacbio_hifi, hybrid]
    optional: false
    depends_on: [abundance_samtools]
    inputs:
      bam:
        type: file
        format: bam
        source: abundance_samtools.bam
      threads: {type: integer, default: 1}
    outputs:
      abundance: {type: file, format: tsv}
      tpm_table: {type: file, format: tsv}
    standard_tables:
      - abundance

  # =========================================================================
  # SECTION 15: Multi-Sample Statistics
  # =========================================================================

  multisample_diversity:
    tool_id: internal
    category: diversity
    name: "Alpha/beta diversity analysis"
    platforms: [illumina, ont, pacbio_hifi, hybrid]
    optional: true
    enable_condition:
      field: sample_analysis.enable
      value: true
    depends_on: [abundance_coverm]
    inputs:
      abundance_table:
        type: file
        format: tsv
        source: abundance_coverm.tpm_table
      sample_metadata:
        type: file
        format: tsv
        source: sample_sheet
    outputs:
      diversity_metrics: {type: file, format: tsv}
    standard_tables:
      - sample_diversity

  multisample_differential_abundance:
    tool_id: internal
    category: statistics
    name: "Differential plasmid abundance between groups"
    platforms: [illumina, ont, pacbio_hifi, hybrid]
    optional: true
    enable_condition:
      field: sample_analysis.differential_abundance
      value: true
    depends_on: [abundance_coverm]
    inputs:
      abundance_table:
        type: file
        format: tsv
        source: abundance_coverm.tpm_table
      sample_metadata:
        type: file
        format: tsv
        source: sample_sheet
      method:
        type: string
        default: deseq2
        enum: [deseq2, ancom_bc]
    outputs:
      differential_abundance_results: {type: file, format: tsv}
    standard_tables:
      - differential_abundance

  multisample_network_fastspar:
    tool_id: fastspar
    category: network
    name: "FastSpar plasmid co-occurrence network"
    platforms: [illumina, ont, pacbio_hifi, hybrid]
    optional: true
    depends_on: [abundance_coverm]
    inputs:
      abundance_table:
        type: file
        format: tsv
        source: abundance_coverm.tpm_table
      threads: {type: integer, default: 1}
    outputs:
      correlation: {type: file, format: tsv}
      covariance: {type: file, format: tsv}
    standard_tables:
      - network_edges
      - network_nodes

  # =========================================================================
  # SECTION 16: Comparative Genomics
  # =========================================================================

  comparative_mmseqs2:
    tool_id: mmseqs2
    category: comparative_genomics
    name: "MMseqs2 plasmid sequence clustering"
    platforms: [illumina, ont, pacbio_hifi, hybrid, assembly]
    optional: true
    enable_condition:
      field: comparative_genomics.enable
      value: true
    depends_on: [plasmid_consensus]
    inputs:
      plasmid_contigs:
        type: file
        format: fasta
        source: plasmid_consensus.plasmid_contigs
      database:
        type: directory
        source: config.resources.mmseqs2_database
      threads: {type: integer, default: 1}
    outputs:
      clusters: {type: file, format: tsv}

  comparative_blast:
    tool_id: blast
    category: comparative_genomics
    name: "BLASTn plasmid sequence comparison"
    platforms: [illumina, ont, pacbio_hifi, hybrid, assembly]
    optional: true
    depends_on: [plasmid_consensus]
    inputs:
      plasmid_contigs:
        type: file
        format: fasta
        source: plasmid_consensus.plasmid_contigs
      database:
        type: file
        format: blast_db
        source: config.resources.blast_database
      threads: {type: integer, default: 1}
    outputs:
      blast_results: {type: file, format: tsv}

  comparative_mummer:
    tool_id: mummer
    category: comparative_genomics
    name: "MUMmer/nucmer whole-genome plasmid alignment"
    platforms: [illumina, ont, pacbio_hifi, hybrid, assembly]
    optional: true
    depends_on: [plasmid_consensus]
    inputs:
      plasmid_contigs:
        type: file
        format: fasta
        source: plasmid_consensus.plasmid_contigs
      reference_plasmids:
        type: file
        format: fasta
        source: config.resources.reference_plasmids
    outputs:
      coords: {type: file, format: tsv}

  comparative_clinker:
    tool_id: clinker
    category: comparative_genomics
    name: "clinker synteny visualization"
    platforms: [illumina, ont, pacbio_hifi, hybrid, assembly]
    optional: true
    depends_on: [annotation_bakta]
    inputs:
      genbank_files:
        type: directory
        source: annotation_bakta.output_dir
    outputs:
      clinker_html: {type: file, format: html}

  # =========================================================================
  # SECTION 17: Visualization
  # =========================================================================

  visualization_clinker_gene_maps:
    tool_id: clinker
    category: visualization
    name: "clinker gene map visualization"
    platforms: [illumina, ont, pacbio_hifi, hybrid, assembly]
    optional: true
    depends_on: [annotation_bakta, comparative_clinker]
    inputs:
      genbank_files:
        type: directory
        source: annotation_bakta.output_dir
    outputs:
      gene_maps: {type: file, format: html}

  visualization_pycirclize:
    tool_id: pycirclize
    category: visualization
    name: "pyCirclize plasmid circular map"
    platforms: [illumina, ont, pacbio_hifi, hybrid, assembly]
    optional: true
    depends_on: [annotation_bakta, typing_plasmidfinder, typing_mob_typer]
    inputs:
      annotations:
        type: file
        format: tsv
        source: annotation_bakta.annotations
      typing:
        type: file
        format: tsv
        source: typing_plasmidfinder.typing_results
    outputs:
      circular_maps: {type: file, format: png}

  visualization_network:
    tool_id: pyvis
    category: visualization
    name: "pyvis host-plasmid interaction network"
    platforms: [illumina, ont, pacbio_hifi, hybrid]
    optional: true
    depends_on:
      - host_plasmid_link_coabundance
      - host_plasmid_link_sequence
      - multisample_network_fastspar
    inputs:
      host_plasmid_links:
        type: file
        format: tsv
        source: host_plasmid_link_coabundance.coabundance_links
      correlation_network:
        type: file
        format: tsv
        source: multisample_network_fastspar.correlation
    outputs:
      network_html: {type: file, format: html}

  # =========================================================================
  # SECTION 17b: Alternative / Additional Tool Nodes
  # =========================================================================
  # These are optional alternative tools declared in the user's canonical DAG.
  # They are disabled by default (optional + no enable_condition) and can be
  # activated via the config tool selection for their respective categories.

  # --- QC alternatives (ONT) ---
  qc_chopper:
    tool_id: chopper
    category: qc
    name: "Chopper long-read QC (ONT alternative)"
    platforms: [ont, hybrid]
    optional: true
    depends_on: []
    inputs:
