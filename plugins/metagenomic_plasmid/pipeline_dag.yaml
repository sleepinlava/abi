    tool_id: internal
    category: plasmid_consensus
    scope: per_sample
    name: Plasmid consensus builder — merge predictions from all detection tools
    platforms:
    - illumina
    - ont
    - pacbio_hifi
    - hybrid
    - assembly
    optional: false
    depends_on:
    - plasmid_detect_genomad
    - plasmid_detect_plasme
    - plasmid_detect_plasx
    - plasmid_detect_platon
    fallback_depends:
    - plasmid_detect_genomad
    inputs:
      genomad_summary:
        type: file
        format: tsv
        source: plasmid_detect_genomad.plasmid_summary
      plasme_predictions:
        type: file
        format: tsv
        source: plasmid_detect_plasme.plasme_predictions
        required: false
      plasx_predictions:
        type: file
        format: tsv
        source: plasmid_detect_plasx.plasx_predictions
        required: false
      platon_predictions:
        type: directory
        source: plasmid_detect_platon.output_dir
        required: false
      consensus_method:
        type: string
        default: intersection
        enum:
        - intersection
        - majority_vote
        - single_tool
        - weighted_vote
      tool_weights:
        type: object
        description: 'Per-tool weight map for weighted_vote strategy. Tools not listed
          receive a default weight of 1.0. Example: {genomad: 0.6, plasme: 0.25, plasx:
          0.15}

          '
        default: {}
        required: false
    outputs:
      plasmid_contigs:
        type: file
        format: fasta
        path: '{outdir}/04_plasmid_detection/{sample_id}/plasmid_contigs.fasta'
        contract:
          min_size: 100B
    standard_tables:
    - plasmid_predictions
    - plasmid_consensus
