# ============================================================================
# Platform-Specific Active Node Resolution
# ============================================================================
#
# For each platform, the active node for each category is resolved as follows.
# `{active_assembly_node}` in source references is replaced at plan time.
# When multiple nodes are listed, the first non-optional, non-disabled node wins.
#
# ============================================================================

platform_resolution:
  illumina:
    assembly: [assembly_megahit, assembly_metaspades]
    qc: [qc_fastp, qc_fastqc_raw, qc_fastqc_clean, qc_multiqc_illumina]
    host_removal: [host_removal_bowtie2]
    contig_mapper: [contig_coverage_bowtie2]
    host_taxonomy: [host_prediction_metaphlan, host_prediction_kraken2]
    abundance_mapper: [abundance_bowtie2]
    host_removal_long: []

  ont:
    assembly: [assembly_metaflye]
    qc: [qc_nanoplot, qc_filtlong, qc_multiqc_ont]
    host_removal: [host_removal_minimap2_long]
    contig_mapper: [contig_coverage_minimap2]
    host_taxonomy: [host_prediction_metaphlan]
    abundance_mapper: [abundance_minimap2]
    host_removal_short: []

  pacbio_hifi:
    assembly: [assembly_hifiasm]
    qc: [qc_hifiadapterfilt, qc_multiqc_hifi]
    host_removal: [host_removal_minimap2_long]
    contig_mapper: [contig_coverage_minimap2]
    host_taxonomy: [host_prediction_metaphlan]
    abundance_mapper: [abundance_minimap2]
    host_removal_short: []

  hybrid:
    assembly: [assembly_opera_ms]
    qc:
      - qc_fastp
      - qc_fastqc_raw
      - qc_fastqc_clean
      - qc_nanoplot
      - qc_filtlong
      - qc_multiqc_illumina
      - qc_multiqc_ont
    host_removal: [host_removal_bowtie2, host_removal_minimap2_long]
    contig_mapper: [contig_coverage_bowtie2, contig_coverage_minimap2]
    host_taxonomy: [host_prediction_metaphlan]
    abundance_mapper: [abundance_bowtie2, abundance_minimap2]

  assembly:
    assembly: [assembly_provided]
    qc: []
    host_removal: []
    contig_mapper: []
    host_taxonomy: [host_prediction_plasmidhostfinder]
    abundance_mapper: []

# ============================================================================
# Contract Enforcement Rules
# ============================================================================
#
# The executor enforces these rules at each edge:
#
# 1. PRE-EXECUTION (before step runs):
#    a. All `required: true` inputs must resolve to existing files
#    b. If input has `source: <upstream_node>.<output_field>`, verify that
#       upstream output passes its contract (file size, format, schema)
#    c. Checksum chain: if upstream output has a recorded SHA256, the input
#       file's SHA256 must match
#
# 2. POST-EXECUTION (after step completes, return_code == 0):
#    a. All declared outputs must exist on disk
#    b. Each output must pass its `contract` (min_size, extensions, schema)
#    c. All `assertions` must evaluate to True
#    d. Output SHA256 is computed and recorded to provenance
#    e. If any check fails → step status = "contract_violation", downstream blocked
#
# 3. CONTRACT VIOLATION RESPONSE:
#    error_code: contract_violation
#    diagnostic_hints:
#      - Which output/assertion failed
#      - Expected vs actual values
#      - Suggested recovery action
#    Downstream nodes are NOT executed
#
# ============================================================================
