abi_version: '0.1'
pipeline_id: metagenomic_plasmid
pipeline_name: AutoPlasm — Metagenomic Plasmid Analysis
description: 'Complete metagenomic plasmid detection, binning, typing, annotation,
  host-linking, abundance estimation, and comparative genomics pipeline supporting
  Illumina, ONT, PacBio HiFi, Hybrid, and Assembly-only inputs.

  '
platforms:
- illumina
- ont
- pacbio_hifi
- hybrid
- assembly
standard_tables:
  plasmid_predictions:
    description: Per-contig plasmid predictions from detection tools
    schema:
    - contig_id
    - sample_id
    - tool_id
    - plasmid_score
    - classification
    - length
    - gc_content
  plasmid_consensus:
    description: Consensus plasmid calls across multiple detection tools
    schema:
    - contig_id
    - sample_id
    - plasmid_call
    - supporting_tools
    - conflicting_tools
    - consensus_method
    - length
    - gc_content
  plasmid_bins:
    description: Plasmid bin assignments from reconstruction tools
    schema:
    - bin_id
    - sample_id
    - contig_ids
    - tool_id
    - completeness
    - contamination
    - plasmid_count
  plasmid_typing:
    description: Plasmid replicon/MOB/PTU typing results
    schema:
    - contig_id
    - sample_id
    - tool_id
    - replicon_type
    - mob_type
    - ptu
    - identity
    - coverage
  annotations:
    description: Gene annotations on plasmid contigs
    schema:
    - contig_id
    - sample_id
    - gene_id
    - tool_id
    - product
    - arg_class
    - vf_class
    - mobile_element_type
    - start
    - end
    - strand
  host_predictions:
    description: Predicted host organisms
    schema:
    - sample_id
    - tool_id
    - taxon_name
    - taxon_id
    - rank
    - abundance
    - detection_method
  host_genomes:
    description: MAG-based host genome bins
    schema:
    - bin_id
    - sample_id
    - completeness
    - contamination
    - taxonomy
    - genome_size
    - n50
    - gc_content
  plasmid_host_links:
    description: Plasmid-to-host linkage evidence
    schema:
    - plasmid_id
    - host_id
    - sample_id
    - evidence_type
    - score
    - supporting_data
  abundance:
    description: Plasmid contig abundance per sample
    schema:
    - contig_id
    - sample_id
    - rpkm
    - tpm
    - coverage
    - raw_count
    - mapper
  sample_diversity:
    description: Alpha/beta diversity across samples
    schema:
    - sample_id
    - metric
    - value
    - group
  differential_abundance:
    description: Differential plasmid abundance between groups
    schema:
    - contig_id
    - group1
    - group2
    - log2fc
    - pvalue
    - padj
    - method
  network_edges:
    description: Plasmid co-occurrence network edges
    schema:
    - source
    - target
    - weight
    - correlation_method
    - pvalue
  network_nodes:
    description: Plasmid co-occurrence network node attributes
    schema:
    - node_id
    - degree
    - betweenness
    - cluster
    - plasmid_type
  plasmid_clusters:
    description: Plasmid sequence clusters across samples
    schema:
    - cluster_id
    - member_id
    - sample_id
    - identity
    - coverage
    - method
  assembly_summary:
    description: Assembly QC metrics
    schema:
    - sample_id
    - assembler
    - total_contigs
    - total_length
    - n50
    - n90
    - max_contig
    - gc_content
  qc_summary:
    description: Read QC metrics per sample
    schema:
    - sample_id
    - tool_id
    - raw_reads
    - clean_reads
    - q20
    - q30
    - gc_content
    - read_length_mean
category_dirs:
  basecalling: 00_input_validation/basecalling
  abundance: 10_abundance
  annotation: 08_annotation
  assembly: 02_assembly
  assembly_qc: 03_assembly_qc
  comparative_genomics: 09_comparative_genomics
  diversity: 11_diversity
  statistics: 11_diversity
  host_prediction: 07_host_prediction
  host_plasmid_linking: 07_host_prediction
  mag_host_genomes: 07_host_prediction/mag
  host_removal: 01_qc/host_removal
  input_validation: 00_input_validation
  network: 12_network
  polishing: 03_assembly_qc/polishing
  contig_coverage: 02_assembly/coverage
  plasmid_binning: 05_plasmid_binning
  plasmid_consensus: 04_plasmid_detection
  plasmid_detection: 04_plasmid_detection
  qc: 01_qc
  report: report
  typing: 06_plasmid_typing
  visualization: 13_visualization
nodes:
  long_reads_provided:
    tool_id: internal
    category: basecalling
    scope: per_sample
    name: Use provided long-read FASTQ
    platforms:
    - ont
    - pacbio_hifi
    - hybrid
    optional: true
    enable_condition:
      field: input.long_reads
      operator: not_empty
    depends_on: []
    inputs:
      long_reads:
        type: file
        format: fastq
        source: sample_sheet
    outputs:
      long_reads:
        type: file
        format: fastq
  basecalling_dorado:
    tool_id: dorado
    category: basecalling
    scope: per_sample
    name: Dorado basecalling from ONT POD5
    platforms:
    - ont
    - hybrid
    optional: true
    enable_condition:
      field: input.pod5
      operator: not_empty
    depends_on: []
    inputs:
      pod5:
        type: path
        source: sample_sheet
      threads:
        type: integer
    outputs:
      long_reads:
        type: file
        format: fastq
        path: '{outdir}/{category_dir}/{sample_id}/{sample_id}.dorado.fastq'
  long_read_bam_to_fastq:
    tool_id: samtools_fastq
    category: basecalling
    scope: per_sample
    name: Convert long-read BAM to FASTQ
    platforms:
    - ont
    - pacbio_hifi
    - hybrid
    optional: true
    enable_condition:
      field: input.bam
      operator: not_empty
    depends_on: []
    inputs:
      bam:
        type: file
        format: bam
        source: sample_sheet
      threads:
        type: integer
        default: 1
    outputs:
      long_reads:
        type: file
        format: fastq
        path: '{outdir}/{category_dir}/{sample_id}/{sample_id}.bam.fastq'
  qc_fastp:
    tool_id: fastp
    category: qc
    scope: per_sample
    name: fastp adapter trimming + quality filtering
    platforms:
    - illumina
    - hybrid
    optional: false
    depends_on: []
    inputs:
      read1:
        type: file
        format: fastq
        contract:
          min_size: 1KB
          extensions:
          - .fastq
          - .fastq.gz
          - .fq
          - .fq.gz
        source: sample_sheet
      read2:
        type: file
        format: fastq
        contract:
          min_size: 1KB
          extensions:
          - .fastq
          - .fastq.gz
          - .fq
          - .fq.gz
        source: sample_sheet
      sample_id:
        type: string
        source: sample_sheet
      threads:
        type: integer
        default: 1
    outputs:
      clean_read1:
        type: file
        format: fastq.gz
        path: '{outdir}/{category_dir}/{sample_id}/{sample_id}_R1.clean.fastq.gz'
        contract:
          min_size: 1KB
      clean_read2:
        type: file
        format: fastq.gz
        path: '{outdir}/{category_dir}/{sample_id}/{sample_id}_R2.clean.fastq.gz'
        contract:
          min_size: 1KB
      html_report:
        type: file
        format: html
        path: '{outdir}/{category_dir}/{sample_id}/{sample_id}.fastp.html'
      json_report:
        type: file
        format: json
        path: '{outdir}/{category_dir}/{sample_id}/{sample_id}.fastp.json'
        contract:
          required_keys:
          - summary
          schema:
            summary.before_filtering.total_reads:
              type: integer
              min: 0
            summary.after_filtering.total_reads:
              type: integer
              min: 0
    assertions:
    - output_json.summary.after_filtering.total_reads > 0
    - output_json.summary.after_filtering.total_reads <= output_json.summary.before_filtering.total_reads
  qc_fastqc_raw:
    tool_id: fastqc
    category: qc
    scope: per_sample
    name: FastQC on raw reads
    platforms:
    - illumina
    - hybrid
    optional: true
    depends_on: []
    inputs:
      read1:
        type: file
        source: sample_sheet
      read2:
        type: file
        source: sample_sheet
    outputs:
      output_dir:
        type: directory
        contract:
          min_size: 1024
    enable_condition:
      field: qc.run_fastqc
      operator: value
      value: true
  qc_fastqc_clean:
    tool_id: fastqc
    category: qc
    scope: per_sample
    name: FastQC on cleaned reads
    platforms:
    - illumina
    - hybrid
    optional: true
    depends_on:
    - qc_fastp
    inputs:
      read1:
        type: file
        source: qc_fastp.clean_read1
      read2:
        type: file
        source: qc_fastp.clean_read2
    outputs:
      output_dir:
        type: directory
        contract:
          min_size: 1024
    enable_condition:
      field: qc.run_fastqc
      operator: value
      value: true
  qc_multiqc_illumina:
    tool_id: multiqc
    category: qc
    scope: cross_sample
    name: MultiQC aggregation (Illumina)
    params:
      project_outdir: '{outdir}'
    platforms:
    - illumina
    - hybrid
    optional: true
    depends_on:
    - qc_fastp
    - qc_fastqc_raw
    - qc_fastqc_clean
    fallback_depends:
    - qc_fastp
    inputs:
      output_dir:
        type: directory
        source: '{project_outdir}/01_qc'
      multiqc_filename:
        type: string
        default: multiqc_illumina_report.html
    outputs:
      output_dir:
        type: directory
      multiqc_report:
        type: file
        format: html
        path: '{outdir}/{category_dir}/multiqc_illumina_report.html'
    enable_condition:
      field: qc.run_multiqc
      operator: value
      value: true
  qc_nanoplot:
    tool_id: nanoplot
    category: qc
    scope: per_sample
    name: NanoPlot quality report (ONT)
    platforms:
    - ont
    - hybrid
    optional: false
    depends_on:
    - long_reads_provided
    - basecalling_dorado
    - long_read_bam_to_fastq
    inputs:
      long_reads:
        type: file
        format: fastq
        contract:
          min_size: 1KB
        source: '{active_long_read_input}.long_reads'
    outputs:
      output_dir:
        type: directory
  qc_filtlong:
    tool_id: filtlong
    category: qc
    scope: per_sample
    name: Filtlong long-read quality filtering
    platforms:
    - ont
    - hybrid
    optional: false
    depends_on:
    - long_reads_provided
    - basecalling_dorado
    - long_read_bam_to_fastq
    inputs:
      long_reads:
        type: file
        format: fastq
        contract:
          min_size: 1KB
        source: '{active_long_read_input}.long_reads'
    outputs:
      filtered_long_reads:
        type: file
        format: fastq
        path: '{outdir}/{category_dir}/{sample_id}/{sample_id}.filtlong.fastq'
        contract:
          min_size: 1KB
      analysis_long_reads:
        type: file
        format: fastq
        path: '{outdir}/{category_dir}/{sample_id}/{sample_id}.filtlong.fastq'
  qc_multiqc_ont:
    tool_id: multiqc
    category: qc
    scope: cross_sample
    name: MultiQC aggregation (ONT)
    params:
      project_outdir: '{outdir}'
    platforms:
    - ont
    optional: true
    depends_on:
    - qc_nanoplot
    - qc_filtlong
    fallback_depends:
    - qc_nanoplot
    inputs:
      output_dir:
        type: directory
        source: '{project_outdir}/01_qc'
      multiqc_filename:
        type: string
        default: multiqc_ont_report.html
    outputs:
      output_dir:
        type: directory
      multiqc_report:
        type: file
        format: html
        path: '{outdir}/{category_dir}/multiqc_ont_report.html'
    enable_condition:
      field: qc.run_multiqc
      operator: value
      value: true
  qc_hifiadapterfilt:
    tool_id: hifiadapterfilt
    category: qc
    scope: per_sample
    name: HiFiAdapterFilt adapter removal
    platforms:
    - pacbio_hifi
    optional: false
    depends_on:
    - long_reads_provided
    - long_read_bam_to_fastq
    inputs:
      long_reads:
        type: file
        format: fastq
        contract:
          min_size: 1KB
        source: '{active_long_read_input}.long_reads'
    outputs:
      filtered_hifi_reads:
        type: file
        format: fastq.gz
        path: '{outdir}/{category_dir}/{sample_id}/{sample_id}.hifiadapterfilt.fastq.gz'
        contract:
          min_size: 1KB
      filtered_long_reads:
        type: file
        format: fastq.gz
        path: '{outdir}/{category_dir}/{sample_id}/{sample_id}.hifiadapterfilt.fastq.gz'
      analysis_long_reads:
        type: file
        format: fastq.gz
        path: '{outdir}/{category_dir}/{sample_id}/{sample_id}.hifiadapterfilt.fastq.gz'
  qc_multiqc_hifi:
    tool_id: multiqc
    category: qc
    scope: cross_sample
    name: MultiQC aggregation (HiFi)
    params:
      project_outdir: '{outdir}'
    platforms:
    - pacbio_hifi
    optional: true
    depends_on:
    - qc_hifiadapterfilt
    inputs:
      output_dir:
        type: directory
        source: '{project_outdir}/01_qc'
      multiqc_filename:
        type: string
        default: multiqc_hifi_report.html
    outputs:
      output_dir:
        type: directory
      multiqc_report:
        type: file
        format: html
        path: '{outdir}/{category_dir}/multiqc_hifi_report.html'
    enable_condition:
      field: qc.run_multiqc
      operator: value
      value: true
  host_removal_bowtie2:
    tool_id: bowtie2_host_removal
    category: host_removal
    scope: per_sample
    name: Bowtie2 host read removal (short reads)
    platforms:
    - illumina
    - hybrid
    optional: true
    enable_condition:
      field: host_removal.host_reference
      operator: not_empty
    depends_on:
    - qc_fastp
    inputs:
      read1:
        type: file
        format: fastq.gz
        source: qc_fastp.clean_read1
      read2:
        type: file
        format: fastq.gz
        source: qc_fastp.clean_read2
      host_reference:
        type: file
        format: fasta_index
        contract:
          extensions:
          - .bt2
          min_files: 4
        source: sample_sheet
      threads:
        type: integer
        default: 1
    outputs:
      clean_read1:
        type: file
        format: fastq.gz
        path: '{outdir}/{category_dir}/{sample_id}/{sample_id}.host_removed.1.fastq.gz'
        contract:
          min_size: 1KB
      clean_read2:
        type: file
        format: fastq.gz
        path: '{outdir}/{category_dir}/{sample_id}/{sample_id}.host_removed.2.fastq.gz'
        contract:
          min_size: 1KB
      host_reads:
        type: file
        format: fastq.gz
      alignment_rate:
        type: file
        format: log
    assertions:
    - output_files.clean_read1 exists
    - output_files.clean_read2 exists
  host_removal_minimap2_long:
    tool_id: minimap2_host_removal
    category: host_removal
    scope: per_sample
    name: minimap2 host read removal (long reads)
    platforms:
    - ont
    - pacbio_hifi
    - hybrid
    optional: true
    enable_condition:
      field: host_removal.host_reference
      operator: not_empty
    depends_on:
    - qc_filtlong
    - qc_hifiadapterfilt
    inputs:
      long_reads:
        type: file
        format: fastq
        source: '{active_long_read_qc}.filtered_long_reads'
      host_reference:
        type: file
        format: fasta
        contract:
          min_size: 1KB
        source: sample_sheet
      threads:
        type: integer
        default: 1
    outputs:
      clean_long_reads:
        type: file
        format: fastq
        path: '{outdir}/{category_dir}/{sample_id}/{sample_id}.host_removed.fastq'
        contract:
          min_size: 1KB
      analysis_long_reads:
        type: file
        format: fastq
        path: '{outdir}/{category_dir}/{sample_id}/{sample_id}.host_removed.fastq'
      host_reads:
        type: file
        format: fastq
  assembly_megahit:
    tool_id: megahit
    category: assembly
    scope: per_sample
    name: MEGAHIT short-read metagenomic assembly
    platforms:
    - illumina
    optional: false
    enable_condition:
      field: assembly.short_read_assembler
      operator: value
      value: megahit
    depends_on:
    - host_removal_bowtie2
    fallback_depends:
    - qc_fastp
    inputs:
      read1:
        type: file
        format: fastq.gz
        source: host_removal_bowtie2.clean_read1
        fallback: qc_fastp.clean_read1
      read2:
        type: file
        format: fastq.gz
        source: host_removal_bowtie2.clean_read2
        fallback: qc_fastp.clean_read2
      threads:
        type: integer
        default: 1
    outputs:
      assembly:
        type: file
        format: fasta
        contract:
          min_size: 500B
          min_contigs: 1
        path: '{outdir}/{category_dir}/{sample_id}/final.contigs.fa'
      output_dir:
        type: directory
  assembly_metaspades:
    tool_id: metaspades
    category: assembly
    scope: per_sample
    name: metaSPAdes short-read metagenomic assembly (alternative)
    platforms:
    - illumina
    optional: true
    enable_condition:
      field: assembly.short_read_assembler
      value: metaspades
    depends_on:
    - host_removal_bowtie2
    fallback_depends:
    - qc_fastp
    inputs:
      read1:
        type: file
        format: fastq.gz
        source: host_removal_bowtie2.clean_read1
        fallback: qc_fastp.clean_read1
      read2:
        type: file
        format: fastq.gz
        source: host_removal_bowtie2.clean_read2
        fallback: qc_fastp.clean_read2
      threads:
        type: integer
        default: 1
    outputs:
      assembly:
        type: file
        format: fasta
        path: '{outdir}/{category_dir}/{sample_id}/contigs.fasta'
        contract:
          min_size: 500B
          min_contigs: 1
      output_dir:
        type: directory
  assembly_metaflye:
    tool_id: metaflye
    category: assembly
    scope: per_sample
    name: metaFlye long-read metagenomic assembly
    platforms:
    - ont
    optional: false
    enable_condition:
      field: assembly.long_read_assembler
      operator: value
      value: metaflye
    depends_on:
    - host_removal_minimap2_long
    fallback_depends:
    - qc_filtlong
    inputs:
      long_reads:
        type: file
        format: fastq
        source: host_removal_minimap2_long.clean_long_reads
        fallback: qc_filtlong.filtered_long_reads
      threads:
        type: integer
        default: 1
    outputs:
      assembly:
        type: file
        format: fasta
        path: '{outdir}/{category_dir}/{sample_id}/assembly.fasta'
        contract:
          min_size: 500B
          min_contigs: 1
      output_dir:
        type: directory
  assembly_hifiasm:
    tool_id: hifiasm_meta
    category: assembly
    scope: per_sample
    name: hifiasm-meta HiFi metagenomic assembly
    platforms:
    - pacbio_hifi
    optional: false
    enable_condition:
      field: assembly.pacbio_hifi_assembler
      operator: value
      value: hifiasm_meta
    depends_on:
    - host_removal_minimap2_long
    fallback_depends:
    - qc_hifiadapterfilt
    inputs:
      long_reads:
        type: file
        format: fastq.gz
        source: host_removal_minimap2_long.clean_long_reads
        fallback: qc_hifiadapterfilt.filtered_hifi_reads
      threads:
        type: integer
        default: 1
    outputs:
      assembly:
        type: file
        format: fasta
        path: '{outdir}/{category_dir}/{sample_id}/{sample_id}.hifiasm.fasta'
        contract:
          min_size: 500B
          min_contigs: 1
      assembly_graph:
        type: file
        format: gfa
      output_dir:
        type: directory
  assembly_opera_ms:
    tool_id: opera_ms
    category: assembly
    scope: per_sample
    name: OPERA-MS hybrid metagenomic assembly
    platforms:
    - hybrid
    optional: false
    enable_condition:
      field: assembly.hybrid_assembler
      operator: value
      value: opera_ms
    depends_on:
    - host_removal_bowtie2
    - host_removal_minimap2_long
    fallback_depends:
    - qc_fastp
    - qc_filtlong
    inputs:
      read1:
        type: file
        format: fastq.gz
        source: host_removal_bowtie2.clean_read1
        fallback: qc_fastp.clean_read1
      read2:
        type: file
        format: fastq.gz
        source: host_removal_bowtie2.clean_read2
        fallback: qc_fastp.clean_read2
      long_reads:
        type: file
        format: fastq
        source: host_removal_minimap2_long.clean_long_reads
        fallback: qc_filtlong.filtered_long_reads
      threads:
        type: integer
        default: 1
    outputs:
      assembly:
        type: file
        format: fasta
        path: '{outdir}/{category_dir}/{sample_id}/contigs.fasta'
        contract:
          min_size: 500B
          min_contigs: 1
      output_dir:
        type: directory
  assembly_provided:
    tool_id: internal
    category: assembly
    scope: per_sample
    name: Use provided assembly FASTA
    platforms:
    - assembly
    optional: false
    depends_on: []
    inputs:
      assembly:
        type: file
        format: fasta
        contract:
          min_size: 500B
          min_contigs: 1
        source: sample_sheet
    outputs:
      assembly:
        type: file
        format: fasta
  polishing_medaka:
    tool_id: medaka
    category: polishing
    scope: per_sample
    name: Optional ONT Medaka consensus polishing
    platforms:
    - ont
    optional: true
    enable_condition:
      field: polishing.tools
      operator: list_contains
      value: medaka
    depends_on:
    - assembly_metaflye
    inputs:
      assembly:
        type: file
        format: fasta
        source: assembly_metaflye.assembly
      long_reads:
        type: file
        format: fastq
        source: host_removal_minimap2_long.clean_long_reads
        fallback: qc_filtlong.filtered_long_reads
      threads:
        type: integer
        default: 1
    outputs:
      assembly:
        type: file
        format: fasta
        path: '{outdir}/{category_dir}/{sample_id}/consensus.fasta'
      output_dir:
        type: directory
  assembly_qc_quast:
    tool_id: quast
    category: assembly_qc
    scope: per_sample
    name: QUAST/metaQUAST assembly quality assessment
    platforms:
    - illumina
    - ont
    - pacbio_hifi
    - hybrid
    - assembly
    optional: false
    depends_on:
    - assembly_megahit
    - assembly_metaspades
    - assembly_metaflye
    - assembly_hifiasm
    - assembly_opera_ms
    - assembly_provided
    - polishing_medaka
    inputs:
      assembly:
