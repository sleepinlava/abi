abi_version: '0.1'
tool_id: hifiasm_meta
name: hifiasm
category: assembly
purpose: Run hifiasm as registered by the metagenomic_plasmid plugin.
when_to_use:
- assembly
inputs:
  long_reads:
    type: path
    required: true
  threads:
    type: integer
    required: true
  sample_id:
    type: string
    required: true
outputs:
  output_dir:
    type: path
execution:
  env_name: autoplasm-assembly
  executable: hifiasm
  command_template: sh -c 'mkdir -p "$1" && hifiasm -t "$2" -o "$1/$3" "$4" && sh
    "$5/scripts/hifiasm_gfa_to_fasta.sh" "$1/$3" "$1/$3.hifiasm.fasta"' autoplasm
    "{output_dir}" "{threads}" "{sample_id}" "{long_reads}" "{project_root}"
  network: false
  writes_output: true
normalization:
  parser: "abi.autoplasm.parsers:parse_hifiasm_meta"
  tables: [assembly_summary]
failure_handling:
  missing_input:
    hint: Check planned input paths and prerequisite upstream steps.
  tool_not_found:
    hint: Install hifiasm in the autoplasm-assembly environment.
  nonzero_exit:
    hint: Inspect provenance/step_logs for stderr and rerun after fixing inputs or
      environment.
