abi_version: '0.1'
tool_id: metaspades
name: metaSPAdes
category: assembly
purpose: Run metaSPAdes as registered by the metagenomic_plasmid plugin.
when_to_use:
- assembly
inputs:
  read1:
    type: path
    required: true
  read2:
    type: path
    required: true
  threads:
    type: integer
    required: true
outputs:
  output_dir:
    type: path
execution:
  env_name: autoplasm-assembly
  executable: metaspades.py
  command_template: metaspades.py -1 {read1} -2 {read2} -o {output_dir} -t {threads}
  network: false
  writes_output: true
failure_handling:
  missing_input:
    hint: Check planned input paths and prerequisite upstream steps.
  tool_not_found:
    hint: Install metaspades.py in the autoplasm-assembly environment.
  nonzero_exit:
    hint: Inspect provenance/step_logs for stderr and rerun after fixing inputs or
      environment.
