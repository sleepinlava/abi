abi_version: '0.1'
tool_id: concoct
name: CONCOCT
category: mag_host_genomes
purpose: Composition and coverage based metagenomic binning.
when_to_use:
- assembly_available
- coverage_available
- binning_required
inputs:
  assembly:
    type: file
    format: fasta
    required: true
  abundance:
    type: file
    format: tsv
    required: true
  threads:
    type: integer
    minimum: 1
outputs:
  output_dir:
    type: directory
execution:
  env_name: plasmid_binning
  executable: concoct
  command_template: concoct --composition_file {assembly} --coverage_file {abundance}
    -o {output_dir} -t {threads}
  network: false
  writes_output: true
failure_handling:
  missing_input:
    hint: Check assembly FASTA and coverage TSV paths.
  tool_not_found:
    hint: Install concoct in the autoplasm-stats environment.
  nonzero_exit:
    hint: Inspect CONCOCT stderr log in provenance/step_logs.

resources:
  cpu: 4
  memory: "4GB"
  walltime: "01:00:00"
