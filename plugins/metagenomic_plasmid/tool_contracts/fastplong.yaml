abi_version: '0.1'
tool_id: fastplong
name: fastplong
category: qc
purpose: Run fastplong as registered by the metagenomic_plasmid plugin.
when_to_use:
- qc
inputs:
  long_reads:
    type: path
    required: true
  sample_id:
    type: string
    required: true
  threads:
    type: integer
    required: true
outputs:
  output_dir:
    type: path
execution:
  executable: fastplong
  command_template: fastplong --in1 {long_reads} --out1 {output_dir}/{sample_id}.long.clean.fastq.gz
    --thread {threads}
  network: false
  writes_output: true
failure_handling:
  missing_input:
    hint: Check planned input paths and prerequisite upstream steps.
  tool_not_found:
    hint: Install fastplong in the autoplasm-qc environment.
  nonzero_exit:
    hint: Inspect provenance/step_logs for stderr and rerun after fixing inputs or
      environment.
resources:
  cpu: 4
  memory: 4GB
  walltime: 01:00:00
