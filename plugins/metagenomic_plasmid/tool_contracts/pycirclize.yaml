abi_version: '0.1'
tool_id: pycirclize
name: pyCirclize
category: visualization
purpose: Generate circular plasmid maps from annotations and typing data.
when_to_use:
- annotations_available
- typing_available
- visualization_required
inputs:
  annotations:
    type: file
    format: tsv
    required: true
  typing:
    type: file
    format: tsv
    required: true
  plasmid_contigs:
    type: file
    format: fasta
    required: true
  sample_id:
    type: string
    required: true
outputs:
  output_dir:
    type: directory
execution:
  executable: python
  command_template: python {project_root}/plugins/metagenomic_plasmid/scripts/pycirclize_viz.py --annotations {annotations} --typing {typing} --contigs {plasmid_contigs} --sample {sample_id} --outdir {output_dir}
  network: false
  writes_output: true
failure_handling:
  missing_input:
    hint: Check annotations TSV, typing TSV, and plasmid contig paths.
  tool_not_found:
    hint: Install pycirclize in the autoplasm-visualization environment.
  nonzero_exit:
    hint: Inspect Python stderr log in provenance/step_logs.
resources:
  cpu: 2
  memory: 4GB
  walltime: "00:30:00"
