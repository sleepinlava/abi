abi_version: '0.1'
tool_id: plasmidfinder
name: PlasmidFinder
category: typing
purpose: Run PlasmidFinder as registered by the metagenomic_plasmid plugin.
when_to_use:
- typing
inputs:
  assembly:
    type: path
    required: true
  database:
    type: path
    required: true
outputs:
  output_dir:
    type: path
execution:
  executable: plasmidfinder.py
  command_template: plasmidfinder.py -i {plasmid_contigs} -o {output_dir} -p {database}
  network: false
  writes_output: true
normalization:
  parser: abi.autoplasm.parsers:parse_plasmidfinder
  tables:
  - plasmid_predictions
  - annotations
failure_handling:
  missing_input:
    hint: Check planned input paths and prerequisite upstream steps.
  tool_not_found:
    hint: Install plasmidfinder.py in the autoplasm-annotation environment.
  nonzero_exit:
    hint: Inspect provenance/step_logs for stderr and rerun after fixing inputs or
      environment.
resources:
  cpu: 4
  memory: 8GB
  walltime: "02:00:00"
