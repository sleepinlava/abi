abi_version: '0.1'
tool_id: mmseqs2
name: MMseqs2
category: comparative_genomics
purpose: Run MMseqs2 as registered by the metagenomic_plasmid plugin.
when_to_use:
- comparative_genomics
inputs:
  plasmid_contigs:
    type: path
    required: true
  threads:
    type: integer
    required: true
outputs:
  output_dir:
    type: path
execution:
  executable: mmseqs
  command_template: mmseqs easy-cluster {plasmid_contigs} {output_dir}/plasmid_catalog
    {output_dir}/tmp --min-seq-id 0.95 -c 0.8 --cov-mode 1 --threads {threads}
  network: false
  writes_output: true
normalization:
  parser: abi.autoplasm.parsers:parse_mmseqs2
  tables:
  - plasmid_catalog
failure_handling:
  missing_input:
    hint: Check planned input paths and prerequisite upstream steps.
  tool_not_found:
    hint: Install mmseqs in the autoplasm-annotation environment.
  nonzero_exit:
    hint: Inspect provenance/step_logs for stderr and rerun after fixing inputs or
      environment.
resources:
  cpu: 8
  memory: 16GB
  walltime: "04:00:00"
