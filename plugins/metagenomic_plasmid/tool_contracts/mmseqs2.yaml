abi_version: '0.1'
tool_id: mmseqs2
name: MMseqs2
category: comparative_genomics
purpose: Run MMseqs2 as registered by the metagenomic_plasmid plugin.
when_to_use:
- comparative_genomics
inputs:
  plasmid_contigs:
    type: path
    required: true
  database:
    type: path
    required: true
  sample_id:
    type: string
    required: true
  threads:
    type: integer
    required: true
outputs:
  output_dir:
    type: path
execution:
  env_name: autoplasm-annotation
  executable: mmseqs
  command_template: mmseqs easy-search {plasmid_contigs} {database} {output_dir}/{sample_id}.mmseqs.tsv
    {output_dir}/tmp --threads {threads}
  network: false
  writes_output: true
normalization:
  parser: "abi.autoplasm.parsers:parse_mmseqs2"
  tables: [comparative_hits]
failure_handling:
  missing_input:
    hint: Check planned input paths and prerequisite upstream steps.
  tool_not_found:
    hint: Install mmseqs in the autoplasm-annotation environment.
  nonzero_exit:
    hint: Inspect provenance/step_logs for stderr and rerun after fixing inputs or
      environment.
