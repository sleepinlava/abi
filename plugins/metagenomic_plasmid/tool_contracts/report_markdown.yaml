abi_version: '0.1'
tool_id: report_markdown
name: AutoPlasm Markdown report
category: report
purpose: Render the AutoPlasm markdown report from ABI result artifacts.
when_to_use:
- report_required
inputs:
  project_outdir:
    type: directory
    required: true
outputs:
  report_md:
    type: file
    format: markdown
execution:
  executable: abi
  command_template: abi report --type metagenomic_plasmid --result-dir {project_outdir}
  network: false
  writes_output: true
failure_handling:
  artifact_missing:
    hint: Run plan or dry-run before report generation.
  nonzero_exit:
    hint: Check report inputs under tables/ and provenance/.
resources:
  cpu: 1
  memory: 2GB
  walltime: "00:30:00"
