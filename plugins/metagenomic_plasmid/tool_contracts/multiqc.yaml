abi_version: '0.1'
tool_id: multiqc
name: MultiQC
category: qc
purpose: Aggregate QC outputs into a single report directory.
when_to_use:
- multiple_qc_outputs
inputs:
  project_outdir:
    type: directory
    required: true
  output_dir:
    type: directory
    required: true
  multiqc_filename:
    type: string
    required: true
outputs:
  multiqc_report:
    type: file
    format: html
execution:
  executable: multiqc
  command_template: multiqc {project_outdir}/01_qc --outdir {output_dir} --filename {multiqc_filename}
  network: false
  writes_output: true
normalization:
  parser: abi.autoplasm.parsers:parse_multiqc
  tables:
  - qc_summary
failure_handling:
  missing_input:
    hint: Run read QC before MultiQC aggregation.
  tool_not_found:
    hint: Install multiqc in the autoplasm-qc environment.
resources:
  cpu: 4
  memory: 4GB
  walltime: "01:00:00"
