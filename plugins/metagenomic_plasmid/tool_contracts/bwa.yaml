abi_version: '0.1'
tool_id: bwa
name: BWA
category: host_removal
purpose: BWA-MEM short-read alignment for host read removal.
when_to_use:
- short_reads
- host_reference_available
inputs:
  host_reference:
    type: file
    format: fasta
    required: true
  read1:
    type: file
    format: fastq
    required: true
  read2:
    type: file
    format: fastq
    required: true
  threads:
    type: integer
    minimum: 1
  sample_id:
    type: string
    required: true
outputs:
  output_dir:
    type: directory
execution:
  env_name: autoplasm-abundance
  executable: bwa
  command_template: sh -c 'bwa index "$1" && bwa mem -t "$2" "$1" "$3" "$4" > "$5"'
    autoplasm "{host_reference}" "{threads}" "{read1}" "{read2}" "{output_dir}/{sample_id}.host_removed.sam"
  network: false
  writes_output: true
failure_handling:
  missing_input:
    hint: Check host reference, read1, and read2 paths.
  tool_not_found:
    hint: Install bwa in the autoplasm-abundance environment.
  nonzero_exit:
    hint: Inspect BWA stderr log in provenance/step_logs.
