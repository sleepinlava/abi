abi_version: '0.1'
tool_id: fastp
name: fastp
category: qc
purpose: Trim and quality-control paired-end metagenomic reads.
when_to_use:
- illumina_reads
- quality_control_required
inputs:
  read1:
    type: file
    required: true
  read2:
    type: file
    required: true
  sample_id:
    type: string
    required: true
  threads:
    type: integer
    minimum: 1
outputs:
  output_dir:
    type: directory
  clean_read1:
    type: file
    format: fastq.gz
  clean_read2:
    type: file
    format: fastq.gz
  html_report:
    type: file
    format: html
  json_report:
    type: file
    format: json
execution:
  executable: fastp
  command_template: fastp -i {read1} -I {read2} -o {output_dir}/{sample_id}_R1.clean.fastq.gz
    -O {output_dir}/{sample_id}_R2.clean.fastq.gz --thread {threads} --html {output_dir}/{sample_id}.fastp.html
    --json {output_dir}/{sample_id}.fastp.json
  network: false
  writes_output: true
normalization:
  parser: abi.autoplasm.parsers:parse_fastp
  tables:
  - qc_summary
failure_handling:
  missing_input:
    hint: Check sample sheet read1/read2 paths.
  tool_not_found:
    hint: Install fastp in the autoplasm-qc environment.
  nonzero_exit:
    hint: Read the fastp stderr log in provenance/step_logs.
resources:
  cpu: 4
  memory: 4GB
  walltime: 01:00:00
