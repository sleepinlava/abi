abi_version: '0.1'
tool_id: mob_typer
name: MOB-typer
category: typing
purpose: Run MOB-typer as registered by the metagenomic_plasmid plugin.
when_to_use:
- typing
inputs:
  plasmid_contigs:
    type: path
    required: true
  sample_id:
    type: string
    required: true
  database:
    type: directory
    required: true
  threads:
    type: integer
    minimum: 1
outputs:
  output_dir:
    type: path
execution:
  executable: mob_typer
  command_template: mob_typer --infile {plasmid_contigs} --out_file {output_dir}/{sample_id}.mob_typer.tsv
    --database_directory {database} --num_threads {threads} --multi
  network: false
  writes_output: true
normalization:
  parser: abi.autoplasm.parsers:parse_mob_typer
  tables:
  - annotations
  - host_predictions
  - plasmid_typing
failure_handling:
  missing_input:
    hint: Check planned input paths and prerequisite upstream steps.
  tool_not_found:
    hint: Install mob_typer in the autoplasm-annotation environment.
  nonzero_exit:
    hint: Inspect provenance/step_logs for stderr and rerun after fixing inputs or
      environment.
resources:
  cpu: 4
  memory: 8GB
  walltime: "02:00:00"
