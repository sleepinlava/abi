abi_version: '0.1'
tool_id: rgi
name: RGI/CARD
category: annotation
purpose: Resistance Gene Identifier against the CARD database.
when_to_use:
- plasmid_contigs_available
- arg_detection_required
inputs:
  plasmid_contigs:
    type: file
    format: fasta
    required: true
  threads:
    type: integer
    minimum: 1
  sample_id:
    type: string
    required: true
outputs:
  output_dir:
    type: directory
execution:
  executable: rgi
  command_template: rgi main --input_sequence {plasmid_contigs} --output_file {output_dir}/{sample_id}.rgi.tsv
    --input_type contig --num_threads {threads}
  network: false
  writes_output: true
failure_handling:
  missing_input:
    hint: Check plasmid_contigs FASTA path.
  missing_database:
    hint: Download CARD database with 'rgi load --card_json'.
  tool_not_found:
    hint: Install rgi in the autoplasm-annotation environment.
  nonzero_exit:
    hint: Inspect RGI stderr log in provenance/step_logs.
resources:
  cpu: 8
  memory: 16GB
  walltime: "04:00:00"
