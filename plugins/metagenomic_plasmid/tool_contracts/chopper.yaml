abi_version: '0.1'
tool_id: chopper
name: Chopper
category: qc
purpose: Fast long-read quality filtering and trimming for ONT data.
when_to_use:
- ont_reads
- long_read_qc_required
inputs:
  long_reads:
    type: file
    format: fastq
    required: true
  threads:
    type: integer
    minimum: 1
  sample_id:
    type: string
    required: true
outputs:
  output_dir:
    type: directory
execution:
  env_name: autoplasm-qc
  executable: chopper
  command_template: chopper --threads {threads} --input {long_reads} > {output_dir}/{sample_id}.chopper.fastq
  network: false
  writes_output: true
failure_handling:
  missing_input:
    hint: Check long_reads FASTQ path.
  tool_not_found:
    hint: Install chopper in the autoplasm-qc environment.
  nonzero_exit:
    hint: Inspect Chopper stderr log in provenance/step_logs.
