abi_version: '0.1'
tool_id: conjscan
name: CONJscan
category: typing
purpose: Detection of conjugative systems in plasmid sequences via MacSyFinder.
when_to_use:
- plasmid_contigs_available
- conjugation_typing_required
inputs:
  plasmid_contigs:
    type: file
    format: fasta
    required: true
  threads:
    type: integer
    minimum: 1
outputs:
  output_dir:
    type: directory
execution:
  executable: conjscan
  command_template: macsyfinder conjscan --db-type ordered_replicon --sequence-db
    {plasmid_contigs} --output-dir {output_dir} --threads {threads}
  network: false
  writes_output: true
failure_handling:
  missing_input:
    hint: Check plasmid_contigs FASTA path.
  tool_not_found:
    hint: Install MacSyFinder + CONJscan in the autoplasm-annotation environment.
  nonzero_exit:
    hint: Inspect MacSyFinder stderr log in provenance/step_logs.
resources:
  cpu: 4
  memory: 8GB
  walltime: 02:00:00
