abi_version: '0.1'
tool_id: blast
name: BLAST+
category: comparative_genomics
purpose: Run BLAST+ as registered by the metagenomic_plasmid plugin.
when_to_use:
- comparative_genomics
inputs:
  plasmid_contigs:
    type: path
    required: true
  database:
    type: path
    required: true
  sample_id:
    type: string
    required: true
  threads:
    type: integer
    required: true
outputs:
  output_dir:
    type: path
execution:
  executable: blastn
  command_template: blastn -query {plasmid_contigs} -db {database} -out {output_dir}/{sample_id}.blast.tsv
    -outfmt 6 -num_threads {threads}
  network: false
  writes_output: true
normalization:
  parser: abi.autoplasm.parsers:parse_blast
  tables:
  - comparative_hits
failure_handling:
  missing_input:
    hint: Check planned input paths and prerequisite upstream steps.
  tool_not_found:
    hint: Install blastn in the autoplasm-annotation environment.
  nonzero_exit:
    hint: Inspect provenance/step_logs for stderr and rerun after fixing inputs or
      environment.
resources:
  cpu: 8
  memory: 16GB
  walltime: "04:00:00"
