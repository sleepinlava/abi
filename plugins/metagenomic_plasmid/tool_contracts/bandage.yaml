abi_version: '0.1'
tool_id: bandage
name: Bandage
category: assembly_qc
purpose: Assembly graph visualization for quality assessment.
when_to_use:
- assembly_graph_available
- visualization_required
inputs:
  assembly_graph:
    type: file
    format: gfa
    required: true
  sample_id:
    type: string
    required: true
outputs:
  output_dir:
    type: directory
execution:
  env_name: autoplasm-assembly
  executable: Bandage
  command_template: Bandage image {assembly_graph} {output_dir}/{sample_id}.bandage.png
    --height 3000 --width 4000
  network: false
  writes_output: true
failure_handling:
  missing_input:
    hint: Check assembly graph GFA path.
  tool_not_found:
    hint: Install Bandage (or BandageNG) in the autoplasm-assembly environment.
  nonzero_exit:
    hint: Inspect Bandage stderr log in provenance/step_logs.
