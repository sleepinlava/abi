abi_version: '0.1'
tool_id: plasmaag
name: PlasMAAG
category: plasmid_binning
purpose: Run PlasMAAG as registered by the metagenomic_plasmid plugin.
when_to_use:
- plasmid_binning
inputs:
  reads_contigs_table:
    type: path
    required: true
  threads:
    type: integer
    required: true
outputs:
  output_dir:
    type: path
execution:
  executable: plasmaag
  command_template: plasmaag --reads_and_contigs {reads_contigs_table} --output {output_dir}
    --threads {threads}
  network: false
  writes_output: true
normalization:
  parser: abi.autoplasm.parsers:parse_plasmaag
  tables:
  - plasmid_bins
  - bin_to_contig
failure_handling:
  missing_input:
    hint: Check planned input paths and prerequisite upstream steps.
  tool_not_found:
    hint: Install plasmaag in the autoplasm-plasmid-binning environment.
  nonzero_exit:
    hint: Inspect provenance/step_logs for stderr and rerun after fixing inputs or
      environment.
resources:
  cpu: 4
  memory: 4GB
  walltime: 01:00:00
