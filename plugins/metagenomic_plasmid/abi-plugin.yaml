abi_version: "0.1"
plugin_id: metagenomic_plasmid
display_name: Metagenomic Plasmid Analysis
description: AutoPlasm adapter using the existing plasmid-analysis planner and executor.
report_title: AutoPlasm ABI Report
plugin_type: adapter
entry_point: abi.plugins.metagenomic_plasmid:MetagenomicPlasmidPlugin
tool_registry: tool_registry.yaml
standard_tables: standard_tables.yaml
tool_contracts: tool_contracts
core_contracts:
  - fastp
  - fastqc
  - multiqc
  - megahit
  - quast
  - genomad
  - metaphlan
  - bakta
  - amrfinderplus
  - isescan
  - integronfinder
  - plasmidfinder
  - mob_typer
  - bowtie2
  - samtools
  - coverm
  - fastspar
  - report_markdown

# ═══════════════════════════════════════════════════════════════════════════
# Workflow declaration — literature-backed core plasmid detection path.
# Covers the core sub-pipeline used in real execution validation.
# The full DAG (pipeline_dag.yaml) remains the single source of
# truth for complete workflow topology; this declaration provides the
# literature-grounded skeleton that infer_dag() uses as L1 ground truth.
# ═══════════════════════════════════════════════════════════════════════════
workflow:
  name: "Metagenomic Plasmid Detection Core Pipeline"
  citation: "Camargo et al. 2023, Nature Biotechnology, doi:10.1038/s41587-023-01953-y — geNomad-based plasmid detection"
  note: >
    This sub-pipeline covers the core value path used in real execution
    validation. The complete DAG is defined in
    pipeline_dag.yaml and includes additional QC, binning, host-linking,
    and comparative-genomics nodes beyond this skeleton.
  steps:
    - id: qc
      tool: fastp
      after: []
      optional: false
      citation: "Chen et al. 2018, Bioinformatics, doi:10.1093/bioinformatics/bty560"
    - id: assembly
      tool: megahit
      after: [qc]
      optional: true
      citation: "Li et al. 2015, Bioinformatics, doi:10.1093/bioinformatics/btv033"
    - id: plasmid_detection
      tool: genomad
      after: [assembly]
      optional: false
      citation: "Camargo et al. 2023, Nature Biotechnology, doi:10.1038/s41587-023-01953-y"
    - id: plasmid_annotation
      tool: bakta
      after: [plasmid_detection]
      optional: false
      citation: "Schwengers et al. 2021, Microbial Genomics, doi:10.1099/mgen.0.000685"
    - id: plasmid_abundance
      tool: coverm
      after: [assembly, plasmid_detection]
      optional: false
      citation: "CoverM (https://github.com/wwood/CoverM) — no standalone paper; cited via Aroney et al. 2025, Nature Methods, doi:10.1038/s41592-024-02547-1 (Aviary tool suite)"
    - id: plasmid_typing
      tool: plasmidfinder
      after: [plasmid_detection]
      optional: false
      citation: "Carattoli et al. 2014, Antimicrobial Agents and Chemotherapy, doi:10.1128/AAC.02412-14"
    - id: plasmid_mobility
      tool: mob_typer
      after: [plasmid_detection]
      optional: false
      citation: "Robertson and Nash 2018, Microbial Genomics, doi:10.1099/mgen.0.000206"
    - id: statistics
      tool: report_markdown
      after: [plasmid_abundance, plasmid_typing, plasmid_mobility]
      optional: false
      citation: "ABI built-in reporting layer — no external reference"
