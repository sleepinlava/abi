# ABI metagenomic_plasmid default configuration
# This file provides default values when no user config is specified.
# Most users will override project_name, sample_sheet, and outdir.

project_name: plasmid_analysis
mode: dry_run
threads: 4
outdir: results/plasmid_analysis
log_dir: logs/plasmid_analysis

# Input section — reference a sample sheet or single-input path
input:
  sample_sheet: sample_sheet.tsv

# QC: fastp trimming + optional fastqc/multiqc
qc:
  enable: auto
  run_fastqc: false
  run_multiqc: false
  tool: fastp

# Assembly: megahit (Illumina) / metaflye (ONT/HiFi) / hybridspades (hybrid)
assembly:
  enable: true
  tool: auto
  min_contig_length: 500

# Assembly QC: QUAST evaluation
assembly_qc:
  enable: true
  tools:
    - quast

# Plasmid detection: geNomad is the default single tool
plasmid_detection:
  enable: true
  tools:
    - genomad
  strategy: single_tool

# Host removal (optional — enabled in auto mode for samples with reads)
host_removal:
  enable: auto
  tool: bowtie2

# Host taxonomy (optional — enabled in auto mode)
host_prediction:
  enable: auto

# Plasmid annotation
annotation:
  enable: true
  general_annotator: bakta
  enable_isescan: false
  enable_integronfinder: false

# AMR / virulence gene detection
typing:
  enable: auto
  tools:
    - amrfinderplus
    - abricate

# Plasmid abundance estimation
abundance:
  enable: auto
  tool: coverm

# Plasmid typing (MOB-suite, PlasmidFinder)
plasmid_typing:
  enable: auto

# Comparative genomics / cross-sample analysis
sample_analysis:
  enable: auto

# Resource paths — each resource block holds a path that can be overridden.
# Level 1 resources (auto_setup=true) can be downloaded via:
#   abi setup-resources --type metagenomic_plasmid --confirm
# Level 2 resources (auto_setup=false) must be downloaded manually;
# run `abi check-resources --type metagenomic_plasmid` for guidance.
resources:
  root: resources/autoplasm
  auto_download: false

  genomad:
    database: GENOMAD_DB_NOT_CONFIGURED
  bakta:
    database: BAKTA_DB_NOT_CONFIGURED
  mob_suite:
    database: MOB_SUITE_DB_NOT_CONFIGURED
  plasmidfinder:
    database: PLASMIDFINDER_DB_NOT_CONFIGURED
  metaphlan:
    database: METAPHLAN_DB_NOT_CONFIGURED
  amrfinderplus:
    database: AMRFINDERPLUS_DB_NOT_CONFIGURED
  kraken2:
    database: KRAKEN2_DB_NOT_CONFIGURED
  gtdbtk:
    database: GTDBTK_DB_NOT_CONFIGURED
  checkm2:
    database: CHECKM2_DB_NOT_CONFIGURED
  plasme:
    database: PLASME_DB_NOT_CONFIGURED
  plasx:
    annotations: PLASX_DATA_NOT_CONFIGURED
    model: PLASX_MODEL_NOT_CONFIGURED
  copla:
    refgraph: COPLA_REFGRAPH_NOT_CONFIGURED
    reflist: COPLA_REFLIST_NOT_CONFIGURED
  blast:
    database: BLAST_DB_NOT_CONFIGURED
  plasmidhostfinder:
    database: PLASMIDHOSTFINDER_DB_NOT_CONFIGURED
