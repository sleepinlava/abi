abi_version: "0.1"
plugin_id: easymetagenome
display_name: EasyMetagenome-style P0
description: ABI-native P0 shotgun metagenomics DAG inspired by EasyMetagenome.
report_title: EasyMetagenome-style P0 ABI Report
plugin_type: standalone
entry_point: abi.plugins.easymetagenome:EasyMetagenomePlugin
tool_registry: tool_registry.yaml
standard_tables: standard_tables.yaml
core_contracts: [seqkit, fastp, kneaddata, kraken2, bracken]
workflow:
  name: EasyMetagenome-style preprocessing and Kraken2/Bracken profiling
  citation: "Liu et al. 2025, iMeta, doi:10.1002/imt2.70008"
  note: ABI-owned structured reimplementation; no EasyMetagenome GPLv3 source is vendored.
  steps:
    - {id: input_stats, tool: seqkit, after: [], optional: false, citation: "Shen et al. 2016, PLoS ONE, doi:10.1371/journal.pone.0163962"}
    - {id: quality_control, tool: fastp, after: [input_stats], optional: false, citation: "Chen et al. 2018, Bioinformatics, doi:10.1093/bioinformatics/bty560"}
    - {id: host_removal, tool: kneaddata, after: [quality_control], optional: false, citation: "KneadData, https://github.com/biobakery/kneaddata"}
    - {id: taxonomy, tool: kraken2, after: [host_removal], optional: false, citation: "Wood et al. 2019, Genome Biology, doi:10.1186/s13059-019-1891-0"}
    - {id: abundance, tool: bracken, after: [taxonomy], optional: false, citation: "Lu et al. 2017, PeerJ Computer Science, doi:10.7717/peerj-cs.104"}
