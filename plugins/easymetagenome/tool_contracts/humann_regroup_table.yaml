abi_version: "0.1"
tool_id: humann_regroup_table
name: HUMAnN Regroup Table
category: functional_summary
purpose: Regroup UniRef gene-family abundance into KO abundance.
inputs: {input_table: {type: file, formats: [tsv], required: true}}
outputs: {regrouped_table: {type: file, format: tsv}}
execution:
  executable: humann_regroup_table
  command_template: humann_regroup_table --input {input_table} --output {regrouped_table}
    --groups {groups}
  network: false
  writes_output: true
normalization: {tables: [functional_abundance]}
failure_handling: {tool_not_found: {hint: Create the easymeta-humann environment.}}
resources: {cpu: 1, memory: 8GB, walltime: "04:00:00"}
