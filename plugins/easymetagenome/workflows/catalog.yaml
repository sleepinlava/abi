workflows:
  - id: p0_taxonomy
    name: Taxonomic profiling
    description: fastp, KneadData, Kraken2, Bracken, prevalence filtering, and diversity.
    required_resources: [host_db, kraken2_db]
    capabilities: [taxonomy]
    include_nodes:
      - validate_manifest
      - seqkit_stat_raw
      - fastp_qc
      - kneaddata_host_removal
      - fastp_summary
      - kneaddata_summary
      - kraken2_classify
      - bracken_phylum
      - bracken_genus
      - bracken_species
      - bracken_merge
      - taxonomy_filter
      - taxonomy_diversity
      - collect_report
  - id: p1_humann4
    name: HUMAnN4 functional profiling
    description: fastp, KneadData, HUMAnN4 gene families, pathways, KO regrouping, and stratified tables.
    required_resources: [host_db, humann_nucleotide_db, humann_protein_db, metaphlan_db]
    capabilities: [functional]
    include_nodes:
      - validate_manifest
      - seqkit_stat_raw
      - fastp_qc
      - kneaddata_host_removal
      - fastp_summary
      - kneaddata_summary
      - concat_dehost_reads
      - humann4_profile
      - humann_join_genefamilies
      - humann_renorm_genefamilies
      - humann_regroup_ko
      - humann_split_ko
      - humann_join_pathabundance
      - humann_renorm_pathabundance
      - humann_split_pathabundance
      - functional_report
  - id: full_read_based
    name: Taxonomic and functional profiling
    description: Runs both the P0 taxonomy and P1 HUMAnN4 branches from shared preprocessing.
    required_resources: [host_db, kraken2_db, humann_nucleotide_db, humann_protein_db, metaphlan_db]
    capabilities: [taxonomy, functional]
    include_nodes:
      - validate_manifest
      - seqkit_stat_raw
      - fastp_qc
      - kneaddata_host_removal
      - fastp_summary
      - kneaddata_summary
      - kraken2_classify
      - bracken_phylum
      - bracken_genus
      - bracken_species
      - bracken_merge
      - taxonomy_filter
      - taxonomy_diversity
      - collect_report
      - concat_dehost_reads
      - humann4_profile
      - humann_join_genefamilies
      - humann_renorm_genefamilies
      - humann_regroup_ko
      - humann_split_ko
      - humann_join_pathabundance
      - humann_renorm_pathabundance
      - humann_split_pathabundance
      - functional_report
