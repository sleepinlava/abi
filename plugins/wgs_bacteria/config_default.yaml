project_name: "wgs_bacteria_run"
mode: dry_run
threads: 4
outdir: results/wgs_bacteria
log_dir: logs/wgs_bacteria

input:
  sample_sheet: sample_sheet.tsv

assembly:
  tool: spades
  # Keep below the 120 GiB cloud-runtime limit while leaving headroom for
  # concurrent system services and SPAdes temporary buffers.
  memory_gb: 80

annotation:
  genus: Escherichia
  species: coli

typing:
  scheme: auto

resources:
  amrfinder_db: AMRFINDER_DB_NOT_CONFIGURED
