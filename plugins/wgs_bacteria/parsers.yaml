# parsers.yaml — declarative output parsing rules for wgs_bacteria.
# Replaces hand-written _parse_amrfinderplus and _parse_mlst Python code.

parsers:
  amrfinderplus:
    source:
      type: tsv_mapping
      pattern: "*amr*.tsv"
      delimiter: "\t"
    target_table: amr_profile
    columns:
      gene_symbol:
        sources: ["Gene symbol", "Element symbol"]
        default: ""
      sequence_name:
        sources: ["Sequence name", "Element name"]
        default: ""
      scope:
        sources: ["Scope"]
        default: ""
      element_type:
        sources: ["Element type", "Type"]
        default: ""
      element_subtype:
        sources: ["Element subtype", "Subtype"]
        default: ""
      target_class:
        sources: ["Class"]
        default: ""
      target_subclass:
        sources: ["Subclass"]
        default: ""
      method:
        sources: ["Method"]
        default: ""
      coverage_pct:
        sources: ["% Coverage of reference sequence", "% Coverage of reference"]
        default: ""
      identity_pct:
        sources: ["% Identity to reference sequence", "% Identity to reference"]
        default: ""
    constants:
      tool: amrfinderplus

  mlst:
    source:
      type: tsv_mapping
      pattern: "mlst*.tsv"
      delimiter: "\t"
      fieldnames: [file, scheme, sequence_type, allele_1, allele_2, allele_3, allele_4, allele_5, allele_6, allele_7]
    target_table: mlst_profile
    columns:
      scheme:
        sources: [scheme]
        default: ""
      sequence_type:
        sources: [sequence_type]
        default: ""
      allele_1:
        sources: [allele_1]
        default: ""
      allele_2:
        sources: [allele_2]
        default: ""
      allele_3:
        sources: [allele_3]
        default: ""
      allele_4:
        sources: [allele_4]
        default: ""
      allele_5:
        sources: [allele_5]
        default: ""
      allele_6:
        sources: [allele_6]
        default: ""
      allele_7:
        sources: [allele_7]
        default: ""
      clonal_complex:
        sources: [sequence_type]
        default: ""
    constants:
      tool: mlst
