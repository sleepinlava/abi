# ============================================================================
# WGS Bacterial Genome Pipeline DAG — Canonical Specification
# ============================================================================
# Updated 2026-06-18 with scope, category_dirs, and path templates for the
# universal DAG planner (abi.dag_planner).

abi_version: "0.1"
pipeline_id: wgs_bacteria
pipeline_name: "Standard Bacterial Isolate WGS Analysis Pipeline"

platforms:
  - illumina

category_dirs:
  qc: 01_qc
  assembly: 02_assembly
  annotation: 03_annotation
  typing: 04_mlst
  amr: 05_amr

standard_tables:
  genome_assembly_stats:
    description: "Assembly quality metrics (N50, contig count, total length)"
  genome_annotation:
    description: "Prokka gene annotations (GFF, GenBank, protein FASTA)"
  mlst_profile:
    description: "7-allele MLST profile with sequence type"
  amr_profile:
    description: "AMRFinderPlus antimicrobial resistance gene calls"

nodes:
  # ── QC ──────────────────────────────────────────────────────────────
  qc_fastp:
    tool_id: fastp
    platforms: [illumina]
    category: qc
    scope: per_sample
    optional: false
    depends_on: []
    inputs:
      read1:  {type: file, format: fastq.gz, source: sample_sheet}
      read2:  {type: file, format: fastq.gz, source: sample_sheet}
    outputs:
      clean_read1:
        type: file
        format: fastq.gz
        path: "{outdir}/{category_dir}/{sample_id}/{sample_id}_R1.clean.fastq.gz"
      clean_read2:
        type: file
        format: fastq.gz
        path: "{outdir}/{category_dir}/{sample_id}/{sample_id}_R2.clean.fastq.gz"
      output_dir:
        type: directory
        path: "{outdir}/{category_dir}/{sample_id}"
    assertions:
      - "output_dir.exists()"

  # ── Assembly ────────────────────────────────────────────────────────
  assembly_spades:
    tool_id: spades
    platforms: [illumina]
    category: assembly
    scope: per_sample
    optional: false
    depends_on: [qc_fastp]
    inputs:
      clean_read1:  {type: file, format: fastq.gz, source: qc_fastp.clean_read1}
      clean_read2:  {type: file, format: fastq.gz, source: qc_fastp.clean_read2}
    outputs:
      contigs_fasta:
        type: file
        format: fasta
        contract: {min_size: "1KB"}
        path: "{outdir}/{category_dir}/{sample_id}/contigs.fasta"
      scaffolds_fasta:
        type: file
        format: fasta
        path: "{outdir}/{category_dir}/{sample_id}/scaffolds.fasta"
      output_dir:
        type: directory
        path: "{outdir}/{category_dir}/{sample_id}"
    assertions:
      - "output_dir.exists()"
      - "output_files.contigs_fasta.min_size >= 1000"

  # ── Annotation ──────────────────────────────────────────────────────
  annotation_prokka:
    tool_id: prokka
    platforms: [illumina, assembly]
    category: annotation
    scope: per_sample
    optional: false
    depends_on: [assembly_spades]
    inputs:
      assembly_fasta:  {type: file, format: fasta, source: assembly_spades.contigs_fasta}
      genus:           {type: string}
      species:         {type: string}
    outputs:
      faa:
        type: file
        format: fasta
        contract: {min_size: "100B"}
        path: "{outdir}/{category_dir}/{sample_id}/{sample_id}.faa"
      gff:
        type: file
        format: gff
        contract: {min_size: "100B"}
        path: "{outdir}/{category_dir}/{sample_id}/{sample_id}.gff"
      gbk:
        type: file
        format: gbk
        path: "{outdir}/{category_dir}/{sample_id}/{sample_id}.gbk"
      output_dir:
        type: directory
        path: "{outdir}/{category_dir}/{sample_id}"
    assertions:
      - "output_dir.exists()"

  # ── MLST ────────────────────────────────────────────────────────────
  mlst:
    tool_id: mlst
    platforms: [illumina, assembly]
    category: typing
    scope: per_sample
    optional: false
    depends_on: [assembly_spades]
    inputs:
      assembly_fasta:  {type: file, format: fasta, source: assembly_spades.contigs_fasta}
      scheme:          {type: string, default: auto}
    outputs:
      mlst_tsv:
        type: file
        format: tsv
        contract: {min_size: "50B"}
        path: "{outdir}/{category_dir}/{sample_id}/mlst.tsv"
      output_dir:
        type: directory
        path: "{outdir}/{category_dir}/{sample_id}"
    assertions:
      - "output_dir.exists()"

  # ── AMR Profiling ───────────────────────────────────────────────────
  amr:
    tool_id: amrfinderplus
    platforms: [illumina, assembly]
    category: amr
    scope: per_sample
    optional: false
    depends_on: [annotation_prokka]
    inputs:
      prokka_faa:  {type: file, format: fasta, source: annotation_prokka.faa}
    outputs:
      amr_tsv:
        type: file
        format: tsv
        contract: {min_size: "50B"}
        path: "{outdir}/{category_dir}/{sample_id}/amr.tsv"
      output_dir:
        type: directory
        path: "{outdir}/{category_dir}/{sample_id}"
    assertions:
      - "output_dir.exists()"
