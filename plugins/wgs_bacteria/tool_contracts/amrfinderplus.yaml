abi_version: '0.1'
tool_id: amrfinderplus
name: AMRFinderPlus
category: amr
purpose: Identify antimicrobial resistance genes, stress response genes, and virulence
  factors in bacterial protein sequences.
when_to_use:
- amr_surveillance
- clinical_microbiology
- resistance_profiling
inputs:
  prokka_faa:
    type: file
    formats:
    - fasta
    - faa
    required: true
  prokka_gff:
    type: file
    formats:
    - gff
    required: false
  amrfinder_db:
    type: directory
    required: true
  threads:
    type: integer
    minimum: 1
    default: 4
outputs:
  output_dir:
    type: directory
  amr_tsv:
    type: file
    format: tsv
execution:
  executable: amrfinder
  command_template: amrfinder --plus --protein {prokka_faa} --gff {prokka_gff} --database
    {amrfinder_db} --output {output_dir}/amr.tsv --threads {threads}
  network: false
  writes_output: true
failure_handling:
  missing_input:
    hint: Prokka protein FASTA or GFF not found. Verify Prokka completed successfully.
  tool_not_found:
    hint: 'AMRFinderPlus not found. Install: conda install -c bioconda ncbi-amrfinderplus'
normalization:
  parser: abi.plugins.wgs_bacteria:_parse_amrfinderplus
  tables:
  - amr_profile
resources:
  cpu: 4
  memory: 8GB
  walltime: "02:00:00"
