# Figure specifications for the wgs_bacteria plugin.
# See: docs/next_development_plan.md §6.3

figures:
  - id: assembly_qc
    type: bar
    source_table: genome_assembly_stats
    x: sample_id
    y: n50
    title: "Assembly N50 and Contig Count"
    xlabel: "Sample"
    ylabel: "N50 (bp)"
    required: true

  - id: genome_gc_scatter
    type: scatter
    source_table: genome_assembly_stats
    x: total_length
    y: gc_content
    title: "Genome Size vs GC Content"
    xlabel: "Genome Size (bp)"
    ylabel: "GC Content (%)"
    required: false

  - id: amr_heatmap
    type: heatmap
    source_table: amr_profile
    x: sample_id
    title: "AMR Gene Detection Heatmap"
    colormap: "Reds"
    top_n: 50
    required: false

  - id: amr_target_class
    type: bar
    source_table: amr_profile
    x: target_class
    title: "AMR Genes by Target Class"
    xlabel: "Target Class"
    ylabel: "Count"
    required: false

  - id: annotation_composition
    type: bar
    source_table: genome_annotation
    x: feature_type
    title: "Genome Feature Types"
    required: false
