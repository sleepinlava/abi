abi_version: "0.1"
tool_id: featurecounts
name: featureCounts
category: expression
purpose: Count reads overlapping gene annotations from an aligned BAM file.
when_to_use:
  - gene_expression_quantification
inputs:
  bam:
    type: file
    format: bam
    required: true
  annotation_gtf:
    type: file
    format: gtf
    required: true
  threads:
    type: integer
    minimum: 1
outputs:
  counts:
    type: file
    format: txt
execution:
  env_name: abi-stats
  executable: featureCounts
  command_template: "featureCounts -T {threads} -a {annotation_gtf} -o {counts} {bam}"
  network: false
  writes_output: true
normalization:
  parser: "abi.plugins.metatranscriptomics:_parse_featurecounts"
  tables:
    - gene_expression
failure_handling:
  missing_input:
    hint: "Check that the alignment step produced the BAM path in the plan."
  missing_resource:
    hint: "Configure resources.annotation_gtf to a valid GTF annotation."
  tool_not_found:
    hint: "Install featureCounts in the abi-stats environment."
  parse_failed:
    hint: "Check the featureCounts output format before normalizing gene_expression.tsv."

resources:
  cpu: 4
  memory: "8GB"
  walltime: "02:00:00"
