tools:
- id: fastp
  name: fastp
  category: qc
  executable: fastp
  default_enabled: true
  required: true
  skill_path: plugins/metatranscriptomics/skills/fastp/SKILL.md
  command_template: fastp -i {read1} -I {read2} -o {output_dir}/{sample_id}_R1.clean.fastq.gz
    -O {output_dir}/{sample_id}_R2.clean.fastq.gz --thread {threads} --html {output_dir}/{sample_id}.fastp.html
    --json {output_dir}/{sample_id}.fastp.json
  inputs:
  - read1
  - read2
- id: star
  name: STAR
  category: alignment
  executable: STAR
  default_enabled: true
  required: true
  skill_path: plugins/metatranscriptomics/skills/star/SKILL.md
  command_template: STAR --runThreadN {threads} --genomeDir {genome_index} --readFilesIn
    {read1} {read2} --readFilesCommand zcat --outSAMtype BAM SortedByCoordinate --outFileNamePrefix
    {output_prefix}
  inputs:
  - read1
  - read2
  - genome_index
- id: featurecounts
  name: featureCounts
  category: expression
  executable: featureCounts
  default_enabled: true
  required: true
  skill_path: plugins/metatranscriptomics/skills/featurecounts/SKILL.md
  command_template: >-
    sh -c 'tmp="$3.stderr.tmp"; if featureCounts -T "$1" -p -a "$2" -o "$3" "$4" 2>"$tmp"; then cat "$tmp" >&2; rm -f "$tmp"; exit 0; fi; rc=$?; if grep -q "No paired-end reads were detected" "$tmp"; then cat "$tmp" >&2; echo "ABI: retrying featureCounts without -p because BAM has no paired-end flags" >&2; rm -f "$tmp"; featureCounts -T "$1" -a "$2" -o "$3" "$4"; else cat "$tmp" >&2; rm -f "$tmp"; exit "$rc"; fi' featurecounts {threads} {annotation_gtf} {counts} {bam}
  inputs:
  - bam
  - annotation_gtf
