# ============================================================================
# Metatranscriptomics Pipeline DAG — Canonical Specification
# ============================================================================
# Created 2026-06-18 for the universal DAG planner (abi.dag_planner).

abi_version: "0.1"
pipeline_id: metatranscriptomics
pipeline_name: "Metatranscriptomics Expression Pipeline"

platforms:
  - illumina

category_dirs:
  qc: 01_qc
  alignment: 02_alignment
  expression: 03_expression

standard_tables:
  qc_summary:
    description: "fastp read QC metrics"
  alignment_summary:
    description: "STAR/HISAT2 alignment statistics"
  gene_expression:
    description: "featureCounts per-gene raw counts"

nodes:
  # ── QC ──────────────────────────────────────────────────────────────
  qc_fastp:
    tool_id: fastp
    platforms: [illumina]
    category: qc
    scope: per_sample
    optional: false
    depends_on: []
    inputs:
      read1:  {type: file, format: fastq.gz, source: sample_sheet}
      read2:  {type: file, format: fastq.gz, source: sample_sheet}
    outputs:
      clean_read1:
        type: file
        format: fastq.gz
        path: "{outdir}/{category_dir}/{sample_id}/{sample_id}_R1.clean.fastq.gz"
      clean_read2:
        type: file
        format: fastq.gz
        path: "{outdir}/{category_dir}/{sample_id}/{sample_id}_R2.clean.fastq.gz"
      output_dir:
        type: directory
        path: "{outdir}/{category_dir}/{sample_id}"
    assertions:
      - "output_dir.exists()"

  # ── Alignment ───────────────────────────────────────────────────────
  alignment_star:
    tool_id: star
    platforms: [illumina]
    category: alignment
    scope: per_sample
    optional: false
    depends_on: [qc_fastp]
    params:
      output_prefix: "{outdir}/{category_dir}/{sample_id}/{sample_id}."
    inputs:
      read1:  {type: file, format: fastq.gz, source: qc_fastp.clean_read1}
      read2:  {type: file, format: fastq.gz, source: qc_fastp.clean_read2}
      genome_index: {type: directory}
    outputs:
      bam:
        type: file
        format: bam
        contract: {min_size: "1KB"}
        path: "{outdir}/{category_dir}/{sample_id}/{sample_id}.Aligned.sortedByCoord.out.bam"
      output_dir:
        type: directory
        path: "{outdir}/{category_dir}/{sample_id}"
    assertions:
      - "output_dir.exists()"

  # ── Quantification ──────────────────────────────────────────────────
  quant_featurecounts:
    tool_id: featurecounts
    platforms: [illumina]
    category: expression
    scope: per_sample
    optional: false
    depends_on: [alignment_star]
    inputs:
      bam:             {type: file, format: bam, source: alignment_star.bam}
      annotation_gtf:  {type: file, format: gtf}
    outputs:
      counts:
        type: file
        format: tsv
        contract: {min_size: "100B"}
        path: "{outdir}/{category_dir}/{sample_id}/{sample_id}.featureCounts.txt"
      output_dir:
        type: directory
        path: "{outdir}/{category_dir}/{sample_id}"
    assertions:
      - "output_dir.exists()"
