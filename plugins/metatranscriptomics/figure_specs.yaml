# Figure specifications for the metatranscriptomics plugin.
# See: docs/next_development_plan.md §6.5

figures:
  - id: rrna_filtering
    type: bar
    source_table: rrna_filter_summary
    x: sample_id
    y: rrna_removed_rate
    title: "rRNA Removal Efficiency"
    xlabel: "Sample"
    ylabel: "rRNA Removed (%)"
    required: true

  - id: taxonomic_activity
    type: stacked_bar
    source_table: taxonomic_expression
    x: sample_id
    title: "Transcriptional Activity by Taxon"
    colormap: "tab20"
    required: true

  - id: pathway_heatmap
    type: heatmap
    source_table: pathway_expression
    x: pathway_id
    title: "Pathway Expression Heatmap"
    colormap: "viridis"
    top_n: 50
    required: true

  - id: gene_family_pca
    type: pca
    source_table: gene_family_expression
    label: sample_id
    color: group
    title: "PCA of Gene Family Expression"
    required: true

  - id: top_pathway_diff
    type: bar
    source_table: functional_activity_summary
    x: pathway_name
    y: fold_change
    title: "Top Differentially Expressed Pathways"
    xlabel: "Pathway"
    ylabel: "log2(Fold Change)"
    sort_by: fold_change
    ascending: false
    required: false
