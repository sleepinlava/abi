# Figure specifications for the metatranscriptomics plugin.
# References only tables that this 3-tool pipeline actually produces:
#   qc_summary, alignment_summary, gene_expression

figures:
  - id: qc_read_counts
    type: bar
    source_table: qc_summary
    x: sample_id
    y: value
    title: "Read QC Summary per Sample"
    xlabel: "Sample"
    ylabel: "Reads"
    required: true

  - id: mapping_rate
    type: bar
    source_table: alignment_summary
    x: sample_id
    y: value
    title: "STAR Mapping Statistics per Sample"
    xlabel: "Sample"
    ylabel: "Value"
    required: true

  - id: gene_expression_heatmap
    type: heatmap
    source_table: gene_expression
    x: sample_id
    title: "Gene Expression Heatmap"
    colormap: "viridis"
    top_n: 50
    required: false

  - id: gene_expression_pca
    type: pca
    source_table: gene_expression
    label: sample_id
    title: "PCA of Gene Expression"
    required: false
