abi_version: "0.1"
plugin_id: metatranscriptomics
display_name: Metatranscriptomics Demo
description: "Minimal RNA-seq style ABI portability demo: fastp, STAR, featureCounts."
report_title: Metatranscriptomics ABI Report
plugin_type: standalone
entry_point: abi.plugins.metatranscriptomics:MetatranscriptomicsPlugin
tool_registry: tool_registry.yaml
standard_tables: standard_tables.yaml
tool_contracts: tool_contracts
core_contracts:
  - fastp
  - star
  - featurecounts

# ═══════════════════════════════════════════════════════════════════════════
# Workflow declaration — literature-backed, plugin-author-maintained.
# Used by infer_dag() as L1 ground truth.  Path-level inference (L2)
# cross-validates against this declaration; mismatches trigger a WARNING.
# ═══════════════════════════════════════════════════════════════════════════
workflow:
  name: "Standard RNA-seq Expression Quantification Pipeline"
  citation: "Conesa et al. 2016, Genome Biology (doi:10.1186/s13059-016-0881-8) — survey of best practices for RNA-seq"
  note: >
    The pipeline uses fastp→STAR→featureCounts.  The commonly cited
    Pertea et al. 2016 (Nature Protocols, doi:10.1038/nprot.2016.095)
    describes HISAT2→StringTie→Ballgown for transcript-level analysis;
    our pipeline targets gene-level quantification and uses STAR as the
    aligner (see Conesa et al. 2016 for tool selection rationale).
  steps:
    - id: qc
      tool: fastp
      after: []
      optional: false
      citation: "Chen et al. 2018, Bioinformatics, doi:10.1093/bioinformatics/bty560"
    - id: alignment
      tool: star
      after: [qc]
      optional: false
      citation: "Dobin et al. 2013, Bioinformatics, doi:10.1093/bioinformatics/bts635"
    - id: quantification
      tool: featurecounts
      after: [alignment]
      optional: false
      citation: "Liao et al. 2014, Bioinformatics, doi:10.1093/bioinformatics/btt656"
