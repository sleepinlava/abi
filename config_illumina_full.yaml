# Illumina full pipeline test config
project_name: illumina_full_test
mode: auto
platform: illumina
threads: 16
outdir: /root/autodl-tmp/abi-illumina-full-run
log_dir: /root/autodl-tmp/abi-illumina-full-run/logs

# Sample sheet
input:
  sample_sheet: /root/autodl-tmp/abi/sample_sheet_illumina_test.tsv

# Execution settings
execution:
  parallel: true
  workers: 3

# Enable tool categories via DAG enable_condition expressions
qc:
  run_fastqc: false
  run_multiqc: false

host_prediction:
  enable: false  # kraken2 DB build failed; will retry
  # tools: [kraken2]

typing:
  tools: [plasmidfinder, mob_typer]
  enable_optional: false

annotation:
  general_annotator: bakta
  tools: [prodigal, bakta, abricate, amrfinderplus, mob_suite]
  enable_optional: false
  enable_isescan: false
  enable_integronfinder: false

plasmid_detection:
  tools: [genomad]

plasmid_binning:
  tools: []

mag_host_genomes:
  tools: []

comparative_genomics:
  enable: true
  tools: [mmseqs2]

network:
  enable: true  # fastspar

visualization:
  enable: true  # clinker, pycirclize, pyvis, dna_features_viewer

host_plasmid_linking:
  enable: false

sample_analysis:
  enable: true
  differential_abundance: true

# Category-level enables for optional cross-sample nodes
diversity:
  enable: true

statistics:
  enable: true

# Resources
resources:
  root: /root/autodl-tmp/abi/resources/autoplasm
  auto_download: false
  genomad:
    database: /root/autodl-tmp/abi/resources/autoplasm/genomad
  bakta:
    database: /root/autodl-tmp/abi/resources/autoplasm/bakta/db-light
  mob_suite:
    database: /root/autodl-tmp/abi/resources/autoplasm/mob_suite
  plasmidfinder:
    database: /root/autodl-tmp/abi/resources/autoplasm/plasmidfinder_db
  metaphlan:
    database: /root/autodl-tmp/abi/resources/autoplasm/metaphlan
  amrfinderplus:
    database: /root/autodl-tmp/abi/resources/autoplasm/amrfinderplus/latest
  mmseqs2:
    database: /root/autodl-tmp/abi/resources/autoplasm/mmseqs2
  kraken2:
    database: /root/autodl-tmp/abi/resources/autoplasm/kraken2
