project_name: autoplasm_project
mode: auto
threads: 16
outdir: results/autoplasm_project
log_dir: log
profile: local
resume: false
force: false
dry_run: false
mock_tools: false

execution:
  parallel: false
  workers: 1
  progress: true
  tool_timeout_seconds: 604800
  resource_timeout_seconds: 86400
  nextflow_timeout_seconds: 604800
  dashboard:
    enable: false
    host: 127.0.0.1
    port: 18790
    open_browser: true

workflow:
  plasmid_contigs_source: auto
  data_profile: null

basecalling:
  enable: true

resources:
  root: resources/autoplasm
  auto_download: false
  genomad:
    database: GENOMAD_DB_NOT_CONFIGURED
    version: ""
  bakta:
    database: BAKTA_DB_NOT_CONFIGURED
    version: ""
  mob_suite:
    database: MOB_SUITE_DB_NOT_CONFIGURED
    version: ""
  plasmidfinder:
    database: PLASMIDFINDER_DB_NOT_CONFIGURED
    version: ""
  metaphlan:
    database: METAPHLAN_DB_NOT_CONFIGURED
    version: ""
  amrfinderplus:
    database: AMRFINDERPLUS_DB_NOT_CONFIGURED/latest
    version: ""
  card:
    database: CARD_DB_NOT_CONFIGURED
    version: ""
  kraken2:
    database: KRAKEN2_DB_NOT_CONFIGURED
    version: ""
  gtdbtk:
    database: GTDBTK_DB_NOT_CONFIGURED
    version: ""
  checkm2:
    database: CHECKM2_DB_NOT_CONFIGURED
    version: ""
  plasme:
    database: PLASME_DB_NOT_CONFIGURED
    version: ""
  plasx:
    annotations: PLASX_DATA_NOT_CONFIGURED
    model: PLASX_MODEL_NOT_CONFIGURED
    version: ""
  copla:
    refgraph: COPLA_REFGRAPH_NOT_CONFIGURED
    reflist: COPLA_REFLIST_NOT_CONFIGURED
    version: ""
  blast:
    database: BLAST_DB_NOT_CONFIGURED
    version: ""
  plasmidhostfinder:
    database: PLASMIDHOSTFINDER_DB_NOT_CONFIGURED
    version: ""
tool_params: {}

input:
  sample_sheet: null
  single_input: null
  read2: null
  long_reads: null
  pod5: null
  bam: null
  assembly: null
  platform: null
  sample_id: single_sample
  group: null

qc:
  enable: true
  short_read_tool: fastp
  long_read_tool: filtlong
  run_fastqc: false
  run_multiqc: true
  optional_tools: []
  avoid_duplicate_qc: true

# Host removal is activated per sample only when host_reference is present.
host_removal:
  enable: auto
  host_reference: null

assembly:
  enable: true
  short_read_assembler: megahit
  high_quality_short_read_assembler: metaspades
  long_read_assembler: metaflye
  pacbio_hifi_assembler: hifiasm_meta
  hybrid_assembler: opera_ms
  assembly_qc: true

polishing:
  enable: false
  tools: []

plasmid_detection:
  enable: true
  tools:
    - genomad
  default_tool: genomad
  strategy: weighted_vote
  tool_weights:
    genomad: 0.6
    platon: 0.15
    plasme: 0.15
    plasx: 0.1
  min_contig_length: 1000
  output_uncertain: true

plasmid_binning:
  enable: false
  tools: auto
  strategy: auto

typing:
  enable: true
  tools:
    - plasmidfinder
    - mob_typer
  optional_tools: []

host_prediction:
  enable: false
  tools:
    - metaphlan
  optional_tools: []
  use_abundance_correlation: true
  use_crispr_spacer: false
  use_methylation: false
  interpretation: evidence_integration

annotation:
  enable: true
  tools:
    - bakta
    - amrfinderplus
    - isescan
    - integronfinder
  optional_tools: []

comparative_genomics:
  enable: true
  tools:
    - mmseqs2
  optional_tools: []

abundance:
  enable: true
  mapper_short: bowtie2
  mapper_long: minimap2
  calculator: coverm
  abundance_policy:
    min_contig_length: 1000
    min_mean_coverage: null
    min_coverage_breadth: null
    multimapping_strategy: report_separately
    length_normalization: tpm
    shared_region_masking: optional
    report_copy_number_bias: true
  normalization:
    - raw_counts
    - coverage
    - rpkm
    - tpm

sample_analysis:
  enable: auto
  alpha_diversity: true
  beta_diversity: true
  differential_abundance: auto
  differential_method: deseq2
  min_diversity_samples: 3
  min_group_replicates: 3

diversity:
  enable: true

statistics:
  enable: true

network:
  enable: auto
  min_samples: 20

# Assembly-contig coverage is only needed by the optional MAG branch.  The
# main plasmid path maps reads after plasmid detection via abundance.
contig_coverage:
  enable: false

mag_host_genomes:
  enable: false
  tools: []

host_plasmid_linking:
  enable: false
  methods:
    - co_abundance

visualization:
  enable: false
  tools: []
  optional_tools: []
  html_report: true
  markdown_report: true
