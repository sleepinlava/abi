name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Check formatting with ruff
        run: ruff format --check src/ tests/

      - name: Type check with mypy
        run: mypy src/abi/ --ignore-missing-imports

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Run tests with coverage
        if: matrix.python-version == '3.12'
        run: |
          pip install pytest-cov
          pytest tests/ -v --tb=short --cov=src/abi --cov-report=term --cov-fail-under=60

      - name: Verify package builds
        if: matrix.python-version == '3.12'
        run: |
          pip install build
          python -m build

      - name: Smoke-test wheel (all plugins)
        if: matrix.python-version == '3.12'
        run: |
          python -m pip install --force-reinstall dist/*.whl
          abi list-types
          autoplasm --help
          # Smoke-test each plugin with dry-run
          for plugin in metagenomic_plasmid rnaseq_expression wgs_bacteria amplicon_16s metatranscriptomics; do
            echo "=== Smoke-test: $plugin ==="
            abi dry-run \
              --type "$plugin" \
              --outdir "/tmp/abi-ci-$plugin" \
              --log-dir "/tmp/abi-ci-$plugin-log" \
              --no-progress || echo "WARNING: $plugin dry-run failed (may need config)"
          done
