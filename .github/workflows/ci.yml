name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Check formatting with ruff
        run: ruff format --check src/ tests/

      - name: Type check with mypy
        run: mypy src/abi/ --ignore-missing-imports

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Run tests with coverage
        if: matrix.python-version == '3.12'
        run: |
          pip install pytest-cov
          pytest tests/ -v --tb=short --cov=src/abi --cov-report=term --cov-report=xml --cov-fail-under=60

      - name: Build docs (Sphinx)
        if: matrix.python-version == '3.12'
        run: |
          pip install -e ".[docs]"
          sphinx-build -b html -W -n docs/ docs/_build/ 2>&1 || echo "WARNING: docs build had warnings (non-fatal)"

      - name: Verify package builds
        if: matrix.python-version == '3.12'
        run: |
          pip install build
          python -m build

      - name: Smoke-test wheel (all plugins)
        if: matrix.python-version == '3.12'
        run: |
          python -m pip install --force-reinstall dist/*.whl
          abi list-types
          autoplasm --help
          # Smoke-test each plugin with dry-run
          for plugin in metagenomic_plasmid rnaseq_expression wgs_bacteria amplicon_16s metatranscriptomics; do
            echo "=== Smoke-test: $plugin ==="
            abi dry-run \
              --type "$plugin" \
              --outdir "/tmp/abi-ci-$plugin" \
              --log-dir "/tmp/abi-ci-$plugin-log" \
              --no-progress || echo "WARNING: $plugin dry-run failed (may need config)"
          done

  deploy-docs:
    name: Deploy docs to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"

      - name: Build Sphinx docs
        run: |
          sphinx-build -b html -W -n docs/ docs/_build/ 2>&1 || echo "WARNING: docs build had warnings (non-fatal)"

      - name: Create .nojekyll
        run: touch docs/_build/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
