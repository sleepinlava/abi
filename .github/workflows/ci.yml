name: CI

on:
  workflow_call:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,report]"

      - name: Verify release identity
        run: python scripts/check_release_identity.py

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Check formatting with ruff
        run: ruff format --check src/ tests/

      - name: Type check with mypy
        run: mypy src/abi/ --ignore-missing-imports

      - name: Lint built-in plugin contracts
        if: matrix.python-version == '3.12'
        run: |
          for plugin in metagenomic_plasmid rnaseq_expression wgs_bacteria amplicon_16s metatranscriptomics easymetagenome viral_viwrap; do
            abi contract-lint --type "$plugin" --strict
          done

      - name: Run tests
        if: matrix.python-version != '3.12'
        run: |
          python -m pytest tests/ src/abi/sciplot/tests/ -v --tb=short \
            --strict-markers -m "not requires_tools"

      - name: Run tests with coverage
        if: matrix.python-version == '3.12'
        run: |
          pip install pytest-cov
          python -m pytest tests/ src/abi/sciplot/tests/ -v --tb=short \
            --strict-markers -m "not requires_tools" \
            --cov=src/abi --cov-branch --cov-report=term --cov-report=xml \
            --cov-report=json:coverage.json --cov-fail-under=75
          python scripts/check_module_coverage.py --coverage coverage.json

      - name: Build docs (Sphinx)
        if: matrix.python-version == '3.12'
        run: |
          pip install -e ".[docs,report]"
          bash docs/build_docs.sh

      - name: Verify package builds
        if: matrix.python-version == '3.12'
        run: |
          pip install build
          python -m build

      - name: Smoke-test wheel (all plugins)
        if: matrix.python-version == '3.12'
        run: |
          python -m pip install --force-reinstall dist/*.whl
          abi list-types
          autoplasm --help
          abi dry-run \
            --type metagenomic_plasmid \
            --config examples/config_minimal.yaml \
            --profile dry_run \
            --outdir /tmp/abi-ci-metagenomic_plasmid \
            --log-dir /tmp/abi-ci-metagenomic_plasmid-log \
            --no-progress
          # Smoke-test each plugin with dry-run
          for plugin in rnaseq_expression wgs_bacteria amplicon_16s metatranscriptomics easymetagenome viral_viwrap; do
            echo "=== Smoke-test: $plugin ==="
            abi dry-run \
              --type "$plugin" \
              --outdir "/tmp/abi-ci-$plugin" \
              --log-dir "/tmp/abi-ci-$plugin-log" \
              --no-check-files \
              --no-progress
          done
  migration-gate:
    name: Migration Gate
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run migration gate
        run: python scripts/migration_gate.py


  deploy-docs:
    name: Deploy docs to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs,report]"

      - name: Build Sphinx docs
        run: bash docs/build_docs.sh

      - name: Create .nojekyll
        run: touch docs/_build/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
