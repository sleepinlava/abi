name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lint and format check
        run: |
          pip install ruff
          ruff check src/ tests/
          ruff format --check src/ tests/

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Verify wheel contents
        run: |
          pip install dist/*.whl
          python -c "import abi; print(f'autoplasm-abi {abi.__version__} imported successfully')"
          abi list-types
          autoplasm --help
          abi dry-run \
            --type metagenomic_plasmid \
            --config examples/config_minimal.yaml \
            --profile dry_run \
            --outdir /tmp/abi-release-plasmid \
            --log-dir /tmp/abi-release-plasmid-log \
            --no-progress
          abi dry-run \
            --type metatranscriptomics \
            --outdir /tmp/abi-release-rnaseq \
            --log-dir /tmp/abi-release-rnaseq-log \
            --no-progress

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
