name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  quality-gate:
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/ci.yml

  release:
    needs: quality-gate
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install release dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,docs,report]"

      - name: Verify tag and package identity
        run: python scripts/check_release_identity.py --tag "${GITHUB_REF_NAME}"

      - name: Build package
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Verify wheel contents
        run: |
          python -m venv /tmp/abi-wheel-smoke
          wheels=(dist/*.whl)
          /tmp/abi-wheel-smoke/bin/pip install "${wheels[0]}[mcp]"
          export PATH="/tmp/abi-wheel-smoke/bin:$PATH"
          /tmp/abi-wheel-smoke/bin/python -c "import abi; from importlib.metadata import version; assert abi.__version__ == version('abi-agent')"
          /tmp/abi-wheel-smoke/bin/abi list-types
          /tmp/abi-wheel-smoke/bin/autoplasm --help
          for platform in claude-code opencode codex; do
            /tmp/abi-wheel-smoke/bin/abi agent install "$platform" \
              --scope project \
              --project-dir "/tmp/abi-release-agent-$platform"
            /tmp/abi-wheel-smoke/bin/abi agent doctor "$platform" \
              --scope project \
              --project-dir "/tmp/abi-release-agent-$platform"
          done
          /tmp/abi-wheel-smoke/bin/abi dry-run \
            --type metagenomic_plasmid \
            --config examples/config_minimal.yaml \
            --profile dry_run \
            --outdir /tmp/abi-release-plasmid \
            --log-dir /tmp/abi-release-plasmid-log \
            --no-progress
          for plugin in rnaseq_expression wgs_bacteria amplicon_16s metatranscriptomics easymetagenome viral_viwrap; do
            /tmp/abi-wheel-smoke/bin/abi dry-run \
              --type "$plugin" \
              --outdir "/tmp/abi-release-$plugin" \
              --log-dir "/tmp/abi-release-$plugin-log" \
              --no-check-files \
              --no-progress
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
