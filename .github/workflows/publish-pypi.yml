name: Publish to PyPI

"on":
  workflow_call:
    inputs:
      tag:
        description: Existing verified GitHub Release tag to publish
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: Existing verified GitHub Release tag to publish
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: Publish verified release distributions
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/abi-agent/
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distributions attached to this GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          REQUESTED_TAG: ${{ inputs.tag }}
        run: |
          gh release download "${REQUESTED_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "*.whl" --pattern "*.tar.gz" --dir dist

      - name: Check distribution metadata
        run: |
          python -m pip install --upgrade twine packaging
          python -m twine check dist/*

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: false
