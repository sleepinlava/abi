name: Publish to PyPI

"on":
  push:
    tags:
      - "pypi-v*"
  release:
    types: [published]
  repository_dispatch:
    types: [publish-pypi]
  workflow_call:
    inputs:
      tag:
        description: Existing verified GitHub Release tag to publish
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: Existing verified GitHub Release tag to publish
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: Publish verified release distributions
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/abi-agent/
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distributions attached to this GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          REQUESTED_TAG: ${{ github.event.release.tag_name || inputs.tag || github.event.client_payload.tag || github.ref_name }}
        run: |
          RELEASE_TAG="${REQUESTED_TAG#pypi-}"
          gh release download "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "*.whl" --pattern "*.tar.gz" --dir dist

      - name: Check distribution metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
