name: Docker

on:
  workflow_dispatch:
    inputs:
      plugin:
        description: "Plugin to build (all, amplicon, rnaseq, wgs, metatranscriptomics)"
        default: "amplicon"
        required: false
        type: string
      push:
        description: "Push to GHCR after building"
        default: false
        required: false
        type: boolean
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write      # Required for GHCR push
    strategy:
      fail-fast: false
      matrix:
        include:
          - plugin: amplicon
            dockerfile: docker/Dockerfile.amplicon
            tag: abi-amplicon
          - plugin: rnaseq
            dockerfile: docker/Dockerfile.rnaseq
            tag: abi-rnaseq
          - plugin: wgs
            dockerfile: docker/Dockerfile.wgs
            tag: abi-wgs
          - plugin: metatranscriptomics
            dockerfile: docker/Dockerfile.metatranscriptomics
            tag: abi-metatranscriptomics
          # metagenomic_plasmid excluded from CI matrix — too large (~15 GB)
          # Build manually: docker build -f docker/Dockerfile.metagenomic_plasmid -t abi-plasmid .

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (${{ matrix.plugin }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          tags: ${{ matrix.tag }}:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test (${{ matrix.plugin }})
        run: |
          docker run --rm ${{ matrix.tag }}:latest list-types
          echo "=== Image ${{ matrix.tag }} smoke-test OK ==="

      - name: Login to GitHub Container Registry
        if: |
          startsWith(github.ref, 'refs/tags/v') ||
          (github.event_name == 'workflow_dispatch' && inputs.push == true)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        if: |
          startsWith(github.ref, 'refs/tags/v') ||
          (github.event_name == 'workflow_dispatch' && inputs.push == true)
        run: |
          set -e
          IMAGE_ID="ghcr.io/${{ github.repository_owner }}/${{ matrix.tag }}"
          # GHCR requires lowercase image names
          IMAGE_ID=$(echo "$IMAGE_ID" | tr '[:upper:]' '[:lower:]')
          echo "Pushing to $IMAGE_ID"
          docker tag ${{ matrix.tag }}:latest "${IMAGE_ID}:latest"
          docker push "${IMAGE_ID}:latest"
          # Tag with version if triggered by tag push
          if [ -n "${{ github.ref_name }}" ]; then
            docker tag ${{ matrix.tag }}:latest "${IMAGE_ID}:${{ github.ref_name }}"
            docker push "${IMAGE_ID}:${{ github.ref_name }}"
          fi
          echo "=== Push complete: ${IMAGE_ID} ==="
