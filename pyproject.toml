[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "abi-agent"
version = "0.1.0"
description = "Agent-Bioinformatics Interface: plugin-based abstraction for AI-driven bioinformatics analysis"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [{ name = "ABI Team" }]
keywords = ["bioinformatics", "agent", "ai", "pipeline", "plasmid", "metagenomics"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Bio-Informatics",
]
dependencies = [
    "typer>=0.9",
    "rich>=13.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
autoplasm = ["autoplasm>=0.1.0"]
dev = [
    "pytest>=7.0",
    "ruff>=0.4",
    "mypy>=1.0",
    "types-PyYAML>=6.0",
]

[project.scripts]
abi = "abi.cli:main"

[project.entry-points."abi.plugins"]
metagenomic_plasmid = "abi.plugins.metagenomic_plasmid:MetagenomicPlasmidPlugin"
metatranscriptomics = "abi.plugins.metatranscriptomics:MetatranscriptomicsPlugin"

[tool.hatch.build.targets.wheel]
packages = ["src/abi"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
