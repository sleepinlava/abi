# WGS Bacterial Isolate Example Configuration
# ============================================================================
# Minimum working config for dry-run testing of the wgs_bacteria plugin.
# Replace resource paths with actual files for real execution.
# ============================================================================

project_name: "wgs_bacteria_example"
mode: dry_run
threads: 4
outdir: results/wgs_example
log_dir: logs/wgs_example

# Sample sheet (TSV with columns: sample_id, read1, read2)
input:
  sample_sheet: data/examples/wgs_bacteria/sample_sheet.tsv

# Assembly tool: spades (default) or unicycler
assembly:
  tool: spades

# Annotation genus/species hints
annotation:
  genus: Escherichia
  species: coli

# MLST typing
typing:
  mlst_scheme: auto

# Reference resources — set these to real paths for execution
resources:
  amrfinder_db: /path/to/amrfinderplus/database
