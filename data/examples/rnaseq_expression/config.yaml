# RNA-seq Expression Example Configuration
# ============================================================================
# This is a minimum working config for dry-run testing of the rnaseq_expression
# plugin.  Replace resource paths with actual files for real execution.
# ============================================================================

project_name: "rnaseq_expression_example"
mode: dry_run
threads: 4
outdir: results/rnaseq_example
log_dir: logs/rnaseq_example

# Sample sheet (TSV with columns: sample_id, group, condition, read1, read2)
input:
  sample_sheet: data/examples/rnaseq_expression/sample_sheet.tsv

# Alignment tool: star (default) or hisat2
alignment:
  tool: star

# Reference resources — set these to real paths for actual execution
resources:
  genome_index: /path/to/star_genome_index
  annotation_gtf: /path/to/annotations.gtf

# Differential expression configuration
differential_expression:
  comparison: "treatment_vs_control"
  alpha: 0.05
