# Metatranscriptomics Benchmark Configuration
# ============================================================================
# Executable config for the metatranscriptomics benchmark smoke test.
#
# Real execution requires: fastp, STAR (or hisat2), featureCounts
# conda envs: abi-qc (fastp), abi-stats (STAR, featureCounts)
#
# NOTE: This plugin requires a reference genome index and annotation GTF.
# Replace the resource paths with actual files for real execution.

project_name: "bench-metatranscriptomics"
mode: local
threads: 2
outdir: results/bench-meta
log_dir: logs/bench-meta

input:
  sample_sheet: data/examples/metatranscriptomics/sample_sheet.tsv

alignment:
  tool: star

# Resource paths — set these to real paths for value-level assertions
resources:
  genome_index: /path/to/star_genome_index
  annotation_gtf: /path/to/annotations.gtf
