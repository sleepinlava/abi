# RNA-seq Expression Benchmark Configuration
# ============================================================================
# Executable config for the rnaseq_expression benchmark smoke test.
# Uses example data from data/examples/rnaseq_expression/.
#
# Real execution requires: fastp, STAR, featureCounts, DESeq2 (R)
# conda envs: abi-qc (fastp), abi-stats (STAR, featureCounts),
#              rnaseq (build_count_matrix, DESeq2)

project_name: "bench-rnaseq"
mode: local
threads: 2
outdir: results/bench-rnaseq
log_dir: logs/bench-rnaseq

input:
  sample_sheet: data/examples/rnaseq_expression/sample_sheet.tsv

alignment:
  tool: star

differential_expression:
  comparison: "treatment_vs_control"
  alpha: 0.05

# Resource paths — set these to real paths for value-level assertions
resources:
  genome_index: /path/to/star_genome_index
  annotation_gtf: /path/to/annotations.gtf
