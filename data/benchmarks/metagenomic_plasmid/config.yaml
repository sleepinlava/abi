# Metagenomic Plasmid Benchmark Configuration
# ============================================================================
# Executable config for the metagenomic_plasmid benchmark smoke test.
# Uses RefSeq plasmid data from data/examples/plasmid_refseq_smoke/.
#
# Real execution requires: fastp, megahit (or spades), prodigal, genomad,
# bakta, coverm.  Multiple conda envs (autoplasm-base, autoplasm-qc, etc.).

project_name: "bench-plasmid"
mode: local
threads: 2
outdir: results/bench-plasmid
log_dir: logs/bench-plasmid

dry_run: false

input:
  sample_sheet: data/examples/plasmid_refseq_smoke/sample_sheet.tsv

plasmid_detection:
  tools: [genomad]
  strategy: single_tool

# Resource paths — set these to real paths for value-level assertions
resources:
  bakta_db: /path/to/bakta/database
