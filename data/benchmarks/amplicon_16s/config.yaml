# Amplicon 16S Benchmark Configuration
# ============================================================================
# Executable config for the amplicon_16s benchmark smoke test.
#
# Real execution requires: cutadapt, vsearch, MAFFT, FastTree, python
# conda env: amplicon

project_name: "bench-amplicon"
mode: local
threads: 2
outdir: results/bench-amplicon
log_dir: logs/bench-amplicon

input:
  sample_sheet: data/examples/amplicon_16s/sample_sheet.tsv

# Resource paths — set these to real paths for value-level assertions
resources:
  sintax_db: /path/to/rdp_sintax.fasta
