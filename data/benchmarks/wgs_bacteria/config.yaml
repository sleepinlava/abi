# WGS Bacteria Benchmark Configuration
# ============================================================================
# Executable config for the wgs_bacteria benchmark smoke test.
# Uses example data from data/examples/wgs_bacteria/.
#
# Real execution requires: fastp, spades.py, prokka, mlst, amrfinder
# conda env: wgs

project_name: "bench-wgs"
mode: local
threads: 2
outdir: results/bench-wgs
log_dir: logs/bench-wgs

input:
  sample_sheet: data/examples/wgs_bacteria/sample_sheet.tsv

assembly:
  tool: spades

annotation:
  genus: Escherichia
  species: coli

typing:
  mlst_scheme: auto

# Resource paths — set these to real paths for value-level assertions
resources:
  amrfinder_db: /path/to/amrfinderplus/database
